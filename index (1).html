<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stakeholder Influence Mapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Public Sans',system-ui,-apple-system,sans-serif;color:#22262d;background:#f4f4f2}
button,input,textarea,select{font-family:inherit}
textarea{resize:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfcfca;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
.node-box{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center;pointer-events:auto;transition:box-shadow .15s ease}
.node-box textarea{border:none;background:transparent;outline:none;padding:0;margin:0;text-align:center;overflow:hidden;field-sizing:content;min-width:48px;display:block}
.btn-tool{border:none;background:transparent;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer;color:#22262d}
.btn-tool:hover{background:#f0f0ed}
.btn-tool.danger{color:#b04a3f}
.btn-tool.danger:hover{background:#faecea}
</style>
</head>
<body>
<div id="app" style="height:100vh;display:flex;flex-direction:column">

  <div style="flex:none;height:58px;display:flex;align-items:center;gap:18px;padding:0 20px;background:#fff;border-bottom:1px solid #e4e4e1;z-index:50;position:relative">
    <div style="display:flex;flex-direction:column;line-height:1.15">
      <span style="font-size:15px;font-weight:700;letter-spacing:-0.01em">Stakeholder Influence Mapper</span>
      <span style="font-size:11.5px;font-weight:500;color:#6b7280">County commissioner votes · Kansas development projects</span>
    </div>
    <div style="flex:1;text-align:center;font-size:11.5px;font-weight:500;color:#9a9a93">
      Drag to move · double-click to rename · select a node to link or delete · double-click canvas to add
    </div>
    <button id="btn-add" style="border:none;background:#3a4a63;color:#fff;font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:9px;cursor:pointer">+ Add node</button>
  </div>

  <div id="canvas" style="position:relative;flex:1;min-height:0;overflow:hidden;background-color:#f4f4f2;background-image:radial-gradient(#dedcd6 1px,transparent 1px);background-size:22px 22px">
    <svg id="svg" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:5;pointer-events:none"></svg>
    <div id="node-layer" style="position:absolute;inset:0;pointer-events:none"></div>

    <div id="toolbar" style="display:none;position:absolute;z-index:60;background:#fff;border:1px solid #e4e4e1;border-radius:9px;padding:4px;box-shadow:0 6px 18px rgba(20,24,32,.14);white-space:nowrap"></div>
    <div id="link-banner" style="display:none;position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:70;background:#22262d;color:#fff;font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;box-shadow:0 6px 18px rgba(20,24,32,.22);pointer-events:none">Click a target node to connect &nbsp;·&nbsp; Esc to cancel</div>
    <div id="link-menu" style="display:none;position:fixed;z-index:70;background:#fff;border:1px solid #e4e4e1;border-radius:11px;padding:11px;box-shadow:0 12px 30px rgba(20,24,32,.2);width:220px"></div>
    <div id="edge-pop" style="display:none;position:absolute;z-index:60;background:#fff;border:1px solid #e4e4e1;border-radius:11px;padding:11px;box-shadow:0 12px 30px rgba(20,24,32,.2);width:220px;transform:translate(-50%,-100%) translateY(-14px)"></div>

    <div style="position:absolute;bottom:18px;left:18px;z-index:56;display:flex;flex-direction:column;gap:8px;align-items:center;font-size:11.5px;font-weight:600;color:#9a9a93;pointer-events:none">
      <div id="zoom-text" style="background:#fff;border:1px solid #e4e4e1;border-radius:9px;padding:6px 12px;box-shadow:0 2px 7px rgba(20,24,32,.08)">100%</div>
      <div style="font-size:10px">Ctrl+Scroll to zoom</div>
    </div>

    <div id="detail-pane" style="display:none;position:absolute;right:18px;top:76px;bottom:18px;z-index:55;width:360px;flex-direction:column;background:#fff;border:1px solid #e4e4e1;border-radius:13px;box-shadow:0 10px 34px rgba(20,24,32,.14);overflow:hidden"></div>
    <div id="legend" style="position:absolute;right:18px;bottom:18px;z-index:55;width:328px;max-height:calc(100% - 36px);display:flex;flex-direction:column;background:#fff;border:1px solid #e4e4e1;border-radius:13px;box-shadow:0 10px 34px rgba(20,24,32,.14);overflow:hidden"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const e = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

class App {
  constructor() {
    this.uid = 100;
    this.nodeEls = {};
    this.drag = null;
    this.panDrag = null;
    this.zoom = 1;
    this.pan = {x:0, y:0};
    this.draft = '';
    this._rq = false;

    const sg = (id,name,role) => ({id,name,role});
    const iv = (id,type,title,desc,status) => ({id,type,title,description:desc,status});

    this.s = {
      nodes: [
        {id:'n0',kind:'central',title:'County Commissioners',subtitle:'Decision-making body',subGroups:[],interventions:[],x:0,y:0},
        {id:'n1',kind:'branch',title:'General Public',subtitle:'Voters & residents',subGroups:[sg('sg1','Local residents','Neighbors & property owners'),sg('sg2','Environmental advocates','Conservation groups')],interventions:[iv('iv1','social_media','','Paid social media campaign','planned'),iv('iv2','direct_engagement','','Community town halls','planned')],x:0,y:0},
        {id:'n2',kind:'branch',title:'County Staff',subtitle:'Planning, legal & admin',subGroups:[sg('sg3','Planning dept','Zoning review'),sg('sg4','County attorney','Legal counsel')],interventions:[iv('iv3','transparency','','Share technical data early','in_progress')],x:0,y:0},
        {id:'n3',kind:'branch',title:'External Organizations',subtitle:'Advocacy & industry groups',subGroups:[sg('sg5','Environmental groups','Advocacy'),sg('sg6','Industry associations','Business support')],interventions:[],x:0,y:0},
        {id:'n4',kind:'branch',title:'Developer',subtitle:'Project applicant',subGroups:[sg('sg7','NextEra Energy','Project lead'),sg('sg8','Legal counsel','Regulatory')],interventions:[],x:0,y:0},
        {id:'n5',kind:'branch',title:'Peer Officials & Political Networks',subtitle:'State & regional allies',subGroups:[sg('sg9','State legislators','Policy influence'),sg('sg10','Regional officials','Peer coordination')],interventions:[],x:0,y:0},
        {id:'n6',kind:'branch',title:'Financial Stakeholders',subtitle:'Investors & landowners',subGroups:[sg('sg11','Landowners','Site hosts'),sg('sg12','Investors','Capital providers')],interventions:[],x:0,y:0},
      ],
      edges: [
        {id:'e1',from:'n0',to:'n1',typeId:'t2'},{id:'e2',from:'n0',to:'n2',typeId:'t1'},
        {id:'e3',from:'n0',to:'n3',typeId:'t2'},{id:'e4',from:'n0',to:'n4',typeId:'t3'},
        {id:'e5',from:'n0',to:'n5',typeId:'t1'},{id:'e6',from:'n0',to:'n6',typeId:'t3'},
      ],
      lineTypes: [
        {id:'t1',label:'Formal influence',dash:'solid',color:'#3a4a63',weight:2.5},
        {id:'t2',label:'Informal pressure',dash:'dashed',color:'#c0892d',weight:2},
        {id:'t3',label:'Financial relationship',dash:'solid',color:'#2f7d5b',weight:2.5},
        {id:'t4',label:'Opposition dynamic',dash:'dotted',color:'#b04a3f',weight:2.5},
      ],
      activeTypeId:'t1',
      selectedNodeId:null, selectedEdgeId:null, detailNodeId:null,
      editingNodeId:null, editingField:null,
      linking:null, linkMenuNode:null, legendOpen:true, sizes:{}, ready:false,
    };
  }

  init() {
    const canvas = $('canvas');
    canvas.addEventListener('pointerdown', e => this.onCanvasDown(e));
    canvas.addEventListener('dblclick', e => this.onCanvasDbl(e));
    canvas.addEventListener('wheel', e => this.onWheel(e), {passive:false});
    window.addEventListener('pointermove', e => this.onWinMove(e));
    window.addEventListener('pointerup', () => this.onWinUp());
    window.addEventListener('keydown', e => this.onKey(e));
    $('btn-add').onclick = () => this.addNode();

    // Static stop-propagation guards (added once, not per-render)
    const stopProp = ev => ev.stopPropagation();
    const stopBoth = el => { el.addEventListener('pointerdown',stopProp); el.addEventListener('dblclick',stopProp); };
    stopBoth($('legend'));
    stopBoth($('detail-pane'));
    stopBoth($('link-menu'));
    stopBoth($('edge-pop'));
    stopBoth($('toolbar'));

    requestAnimationFrame(() => this.relayout());
  }

  set(fn) {
    if (typeof fn === 'function') {
      const patch = fn(this.s);
      if (patch) Object.assign(this.s, patch);
    } else {
      Object.assign(this.s, fn);
    }
    this.schedRender();
  }

  schedRender() {
    if (this._rq) return;
    this._rq = true;
    requestAnimationFrame(() => { this._rq = false; this.render(); });
  }

  relayout() {
    const canvas = $('canvas');
    const r = canvas.getBoundingClientRect();
    const W = r.width || 1280, H = r.height || 720;
    const availW = Math.max(360, W - 360);
    const cx = 18 + availW / 2, cy = H / 2 - 6;
    const R = Math.max(168, Math.min(290, Math.min(availW, H) * 0.36));
    const order = ['n1','n2','n3','n4','n5','n6'];
    const start = -Math.PI / 2;
    const pos = {n0:{x:cx,y:cy}};
    order.forEach((id,i) => { const a = start + i*(Math.PI*2/6); pos[id]={x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)}; });
    this.set(s => ({ nodes: s.nodes.map(n => pos[n.id] ? {...n,...pos[n.id]} : n), ready:true }));
  }

  sizeOf(n) { return this.s.sizes[n.id] || (n.kind==='central'?{w:200,h:70}:{w:150,h:54}); }

  nodeById(id) { return this.s.nodes.find(n => n.id === id); }
  typeById(id) { return this.s.lineTypes.find(t => t.id === id) || this.s.lineTypes[0]; }

  exit(cx,cy,hw,hh,tx,ty,gap) {
    let dx=tx-cx, dy=ty-cy;
    if(!dx&&!dy) return {x:cx,y:cy};
    const sx=dx?hw/Math.abs(dx):Infinity, sy=dy?hh/Math.abs(dy):Infinity;
    const sc=Math.min(sx,sy);
    const len=Math.hypot(dx,dy);
    return {x:cx+dx*sc+dx/len*gap, y:cy+dy*sc+dy/len*gap};
  }

  dashFor(t) {
    if(t.dash==='dashed') return `${t.weight*3.2} ${t.weight*2.6}`;
    if(t.dash==='dotted') return `0.1 ${t.weight*3}`;
    return 'none';
  }

  // ─── EVENT HANDLERS ──────────────────────────────────────────
  onCanvasDown(ev) {
    if(ev.target.closest && ev.target.closest('.node-box,#toolbar,#legend,#detail-pane,#link-menu,#edge-pop')) return;
    if(this.s.linking){ this.set({linking:null}); return; }
    if(this.s.linkMenuNode){ this.set({linkMenuNode:null}); return; }
    this.set({selectedNodeId:null, selectedEdgeId:null, editingNodeId:null, editingField:null});
    this.panDrag = {sx:ev.clientX, sy:ev.clientY, px:this.pan.x, py:this.pan.y};
  }

  onCanvasDbl(ev) {
    if(ev.target.dataset && ev.target.dataset.edgeId) return;
    if(ev.target.closest && ev.target.closest('.node-box,#toolbar,#legend,#detail-pane,#link-menu,#edge-pop')) return;
    const tag = ev.target.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='BUTTON'||tag==='SELECT') return;
    const canvas = $('canvas');
    const r = canvas.getBoundingClientRect();
    const x = (ev.clientX - r.left - this.pan.x) / this.zoom;
    const y = (ev.clientY - r.top - this.pan.y) / this.zoom;
    this.spawnNode(x, y);
  }

  onWheel(ev) {
    if(!ev.ctrlKey && !ev.metaKey) return;
    ev.preventDefault();
    const delta = ev.deltaY > 0 ? 0.9 : 1.1;
    this.zoom = Math.max(0.4, Math.min(3, this.zoom * delta));
    this.schedRender();
  }

  onWinMove(ev) {
    if(this.panDrag) {
      this.pan.x = this.panDrag.px + (ev.clientX - this.panDrag.sx);
      this.pan.y = this.panDrag.py + (ev.clientY - this.panDrag.sy);
      this.schedRender();
    } else if(this.drag) {
      const d = this.drag;
      const nx = d.ox + (ev.clientX - d.sx) / this.zoom;
      const ny = d.oy + (ev.clientY - d.sy) / this.zoom;
      if(!d.moved && Math.hypot(ev.clientX-d.sx, ev.clientY-d.sy) > 3) d.moved = true;
      this.set(s => ({ nodes: s.nodes.map(n => n.id===d.id ? {...n,x:nx,y:ny} : n) }));
    } else if(this.s.linking) {
      const canvas = $('canvas');
      const r = canvas.getBoundingClientRect();
      const x = (ev.clientX - r.left - this.pan.x) / this.zoom;
      const y = (ev.clientY - r.top - this.pan.y) / this.zoom;
      this.set(s => s.linking ? {linking:{...s.linking,x,y}} : null);
    }
  }

  onWinUp() {
    this.panDrag = null;
    this.drag = null;
  }

  onKey(ev) {
    if(this.s.editingNodeId) return;
    const ae = document.activeElement;
    if(ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')) return;
    if(ev.key==='Escape') { this.set({selectedNodeId:null,selectedEdgeId:null,linking:null,linkMenuNode:null,editingNodeId:null,editingField:null}); return; }
    if(ev.key==='Delete'||ev.key==='Backspace') {
      if(this.s.selectedNodeId){ ev.preventDefault(); this.deleteNode(this.s.selectedNodeId); }
      else if(this.s.selectedEdgeId){ ev.preventDefault(); this.deleteEdge(this.s.selectedEdgeId); }
    }
  }

  onNodeDown(id, ev) {
    ev.stopPropagation();
    if(ev.target.dataset.noDrag) return;
    if(this.s.editingNodeId===id) return;

    if(this.s.linking) {
      const from = this.s.linking.fromId;
      if(from!==id) this.createEdge(from, id);
      else this.set({linking:null, linkMenuNode:null});
      return;
    }
    if(this.s.linkMenuNode) return;

    this.set({selectedNodeId:id, selectedEdgeId:null});
    const n = this.nodeById(id);
    this.drag = {id, ox:n.x, oy:n.y, sx:ev.clientX, sy:ev.clientY, moved:false};
  }

  onNodeDbl(id, ev) {
    ev.stopPropagation();
    if(ev.target.dataset.field==='subtitle') {
      this.startEdit(id, 'subtitle'); return;
    }
    this.startEdit(id, 'title');
  }

  // ─── EDITING ─────────────────────────────────────────────────
  startEdit(id, field) {
    const n = this.nodeById(id); if(!n) return;
    this.draft = field==='title' ? (n.title||'') : (n.subtitle||'');
    this.set({editingNodeId:id, editingField:field, selectedNodeId:id, linking:null, linkMenuNode:null});
  }

  commitEdit() {
    const {editingNodeId, editingField} = this.s; if(!editingNodeId) return;
    let val = this.draft;
    if(editingField==='title' && val.trim()==='') val='Untitled';
    this.set(s => ({ nodes: s.nodes.map(n => n.id===editingNodeId ? {...n,[editingField]:val} : n), editingNodeId:null, editingField:null }));
  }

  cancelEdit() { this.set({editingNodeId:null, editingField:null}); }

  onDraftKey(ev) {
    if(ev.key==='Enter'&&!ev.shiftKey){ ev.preventDefault(); this.commitEdit(); }
    else if(ev.key==='Escape'){ ev.preventDefault(); this.cancelEdit(); }
  }

  // ─── NODES ───────────────────────────────────────────────────
  spawnNode(x, y) {
    const id = 'n'+(++this.uid);
    this.set(s => ({ nodes:[...s.nodes,{id,kind:'branch',title:'',subtitle:'',subGroups:[],interventions:[],x,y}], selectedNodeId:id, linking:null }));
    requestAnimationFrame(() => this.startEdit(id,'title'));
  }

  addNode() {
    const canvas = $('canvas'); if(!canvas) return;
    const r = canvas.getBoundingClientRect();
    this.spawnNode((r.width/2-this.pan.x)/this.zoom+(Math.random()*120-60), (r.height/2-this.pan.y)/this.zoom+(Math.random()*120-60));
  }

  deleteNode(id) {
    this.set(s => ({
      nodes: s.nodes.filter(n => n.id!==id),
      edges: s.edges.filter(ed => ed.from!==id&&ed.to!==id),
      selectedNodeId: s.selectedNodeId===id ? null : s.selectedNodeId,
      detailNodeId: s.detailNodeId===id ? null : s.detailNodeId,
      editingNodeId: s.editingNodeId===id ? null : s.editingNodeId,
    }));
  }

  // ─── EDGES ───────────────────────────────────────────────────
  startLinking(id) {
    const n = this.nodeById(id); if(!n) return;
    this.set({linkMenuNode:id, selectedNodeId:id, selectedEdgeId:null});
  }

  confirmLinkType(typeId) {
    const fromId = this.s.linkMenuNode;
    const n = this.nodeById(fromId); if(!n) return;
    this.set({linking:{fromId, x:n.x, y:n.y}, linkMenuNode:null, activeTypeId:typeId});
  }

  createEdge(from, to) {
    if(from===to) return;
    const tid = this.s.activeTypeId;
    const dup = this.s.edges.some(ed => (ed.from===from&&ed.to===to||ed.from===to&&ed.to===from)&&ed.typeId===tid);
    if(dup){ this.set({linking:null}); return; }
    const id='e'+(++this.uid);
    this.set(s => ({ edges:[...s.edges,{id,from,to,typeId:tid}], selectedEdgeId:id, selectedNodeId:null, linking:null }));
  }

  deleteEdge(id) { this.set(s => ({ edges:s.edges.filter(ed=>ed.id!==id), selectedEdgeId:null })); }
  setEdgeType(eid, tid) { this.set(s => ({ edges:s.edges.map(ed=>ed.id===eid?{...ed,typeId:tid}:ed) })); }

  // ─── LINE TYPES ──────────────────────────────────────────────
  addLineType() {
    const id='t'+(++this.uid);
    this.set(s => ({ lineTypes:[...s.lineTypes,{id,label:'New relationship',dash:'solid',color:'#5b6470',weight:2}], activeTypeId:id }));
  }

  deleteLineType(id) {
    if(this.s.lineTypes.length<=1) return;
    this.set(s => {
      const rem = s.lineTypes.filter(t=>t.id!==id);
      const fb = rem[0].id;
      return { lineTypes:rem, edges:s.edges.map(ed=>ed.typeId===id?{...ed,typeId:fb}:ed), activeTypeId:s.activeTypeId===id?fb:s.activeTypeId };
    });
  }

  updateType(id, patch) { this.set(s => ({ lineTypes:s.lineTypes.map(t=>t.id===id?{...t,...patch}:t) })); }

  // ─── DETAIL PANE ─────────────────────────────────────────────
  openDetail(id) { this.set({detailNodeId:id, selectedNodeId:id, selectedEdgeId:null}); }
  closeDetail() { this.set({detailNodeId:null}); }

  addSubGroup(nodeId) {
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,subGroups:[...(n.subGroups||[]),{id:'sg'+(++this.uid),name:'',role:''}]}:n) }));
  }
  deleteSubGroup(nodeId,sgId) {
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,subGroups:(n.subGroups||[]).filter(sg=>sg.id!==sgId)}:n) }));
  }
  updateSubGroup(nodeId,sgId,patch) {
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,subGroups:(n.subGroups||[]).map(sg=>sg.id===sgId?{...sg,...patch}:sg)}:n) }));
  }

  addIntervention(nodeId) {
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,interventions:[...(n.interventions||[]),{id:'iv'+(++this.uid),type:'social_media',title:'',description:'',status:'planned'}]}:n) }));
  }
  deleteIntervention(nodeId,ivId) {
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,interventions:(n.interventions||[]).filter(iv=>iv.id!==ivId)}:n) }));
  }
  updateIntervention(nodeId,ivId,patch) {
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,interventions:(n.interventions||[]).map(iv=>iv.id===ivId?{...iv,...patch}:iv)}:n) }));
  }
  cycleType(nodeId,ivId) {
    const order=['social_media','direct_engagement','transparency','economic'];
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,interventions:(n.interventions||[]).map(iv=>{if(iv.id!==ivId)return iv;const i=order.indexOf(iv.type);return{...iv,type:order[(i+1)%order.length]};})}:n) }));
  }
  cycleStatus(nodeId,ivId) {
    const order=['planned','in_progress','completed'];
    this.set(s => ({ nodes:s.nodes.map(n=>n.id===nodeId?{...n,interventions:(n.interventions||[]).map(iv=>{if(iv.id!==ivId)return iv;const i=order.indexOf(iv.status);return{...iv,status:order[(i+1)%order.length]};})}:n) }));
  }

  // ─── RENDER ──────────────────────────────────────────────────
  render() {
    if(!this.s.ready) return;
    this.renderTransforms();
    this.renderEdges();
    this.renderNodes();
    this.renderToolbar();
    this.renderLinkBanner();
    this.renderLinkMenu();
    this.renderDetailPane();
    this.renderLegend();
    $('zoom-text').textContent = Math.round(this.zoom*100)+'%';
  }

  renderTransforms() {
    const t = `translate(${this.pan.x}px,${this.pan.y}px) scale(${this.zoom})`;
    const to = '0 0';
    const svg = $('svg');
    svg.style.transform = t; svg.style.transformOrigin = to;
    const nl = $('node-layer');
    nl.style.transform = t; nl.style.transformOrigin = to;
  }

  renderEdges() {
    const {edges, nodes, lineTypes, linking, selectedEdgeId, sizes} = this.s;
    const nb = {}; nodes.forEach(n=>nb[n.id]=n);
    const tb = {}; lineTypes.forEach(t=>tb[t.id]=t);

    let svg = '';
    let selEdgePos = null;

    for(const ed of edges) {
      const a=nb[ed.from], b=nb[ed.to]; if(!a||!b) continue;
      const sa=this.sizeOf(a), sb=this.sizeOf(b);
      const p1=this.exit(a.x,a.y,sa.w/2,sa.h/2,b.x,b.y,5);
      const p2=this.exit(b.x,b.y,sb.w/2,sb.h/2,a.x,a.y,5);
      const t=tb[ed.typeId]||lineTypes[0];
      const dash=this.dashFor(t);
      const sel=selectedEdgeId===ed.id;
      const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
      if(sel) selEdgePos={mx,my,ed};
      if(sel) svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="rgba(58,74,99,.2)" stroke-width="${t.weight+9}" stroke-linecap="round"/>`;
      svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${t.color}" stroke-width="${t.weight}" stroke-dasharray="${dash}" stroke-linecap="round"/>`;
      svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="transparent" stroke-width="18" stroke-linecap="round" style="pointer-events:stroke;cursor:pointer" data-edge-id="${ed.id}"/>`;
    }

    if(linking) {
      const a=nb[linking.fromId];
      if(a) {
        const t=tb[this.s.activeTypeId]||lineTypes[0];
        svg+=`<line x1="${a.x}" y1="${a.y}" x2="${linking.x}" y2="${linking.y}" stroke="#3a4a63" stroke-width="2" stroke-dasharray="6 5" stroke-linecap="round" opacity=".65"/>`;
      }
    }

    $('svg').innerHTML = svg;

    // Edge click handlers
    $('svg').querySelectorAll('[data-edge-id]').forEach(el => {
      el.addEventListener('click', ev => {
        ev.stopPropagation();
        this.set({selectedEdgeId:el.dataset.edgeId, selectedNodeId:null, linking:null});
      });
    });

    // Edge popover
    const ep = $('edge-pop');
    if(selEdgePos) {
      const canvas=$('canvas'), r=canvas.getBoundingClientRect();
      const sx=r.left+this.pan.x+selEdgePos.mx*this.zoom;
      const sy=r.top+this.pan.y+selEdgePos.my*this.zoom;
      // Position relative to canvas
      const cx=selEdgePos.mx*this.zoom+this.pan.x;
      const cy=selEdgePos.my*this.zoom+this.pan.y;
      ep.style.display='block';
      ep.style.left=cx+'px';
      ep.style.top=cy+'px';
      const ed=selEdgePos.ed;
      let h=`<div style="font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px">Relationship type</div><div style="display:flex;flex-direction:column;gap:4px">`;
      for(const t of lineTypes) {
        const active=ed.typeId===t.id;
        const border=active?'border-color:#3a4a63;background:#eef1f5':'border-color:#e4e4e1;background:#fff';
        const preview=`width:26px;height:0;border-top:${Math.min(t.weight,4)}px ${t.dash} ${t.color}`;
        h+=`<button data-set-edge="${ed.id}" data-set-type="${t.id}" style="display:flex;align-items:center;gap:9px;width:100%;border:1px solid;${border};border-radius:8px;padding:7px 9px;cursor:pointer;font-size:12px;font-weight:600;color:#22262d"><span style="${preview};display:inline-block;flex:none"></span><span style="flex:1;text-align:left">${e(t.label)}</span>${active?'<span style="color:#3a4a63;font-weight:700">✓</span>':''}</button>`;
      }
      h+=`</div><button data-del-edge="${ed.id}" style="margin-top:8px;width:100%;border:1px solid #ecdad7;background:#fbf2f1;color:#b04a3f;font-size:12px;font-weight:600;padding:7px;border-radius:8px;cursor:pointer">Delete link</button>`;
      ep.innerHTML=h;
      ep.querySelectorAll('[data-set-edge]').forEach(btn=>{
        btn.onclick=ev=>{ev.stopPropagation();this.setEdgeType(btn.dataset.setEdge,btn.dataset.setType);};
      });
      ep.querySelectorAll('[data-del-edge]').forEach(btn=>{
        btn.onclick=ev=>{ev.stopPropagation();this.deleteEdge(btn.dataset.delEdge);};
      });
    } else {
      ep.style.display='none';
    }
  }

  renderNodes() {
    const {nodes, selectedNodeId, editingNodeId, editingField, sizes} = this.s;
    const layer = $('node-layer');
    const accent='#3a4a63';

    // Remove deleted nodes
    Object.keys(this.nodeEls).forEach(id => {
      if(!nodes.find(n=>n.id===id)) { this.nodeEls[id].remove(); delete this.nodeEls[id]; }
    });

    const focusedEl = document.activeElement;

    for(const node of nodes) {
      let el = this.nodeEls[node.id];
      if(!el) {
        el = document.createElement('div');
        el.className = 'node-box';
        el.dataset.nodeId = node.id;
        el.addEventListener('pointerdown', ev => this.onNodeDown(node.id, ev));
        el.addEventListener('dblclick', ev => this.onNodeDbl(node.id, ev));
        layer.appendChild(el);
        this.nodeEls[node.id] = el;
      }

      const central = node.kind==='central';
      const sel = selectedNodeId===node.id;
      const editing = editingNodeId===node.id;

      // Position & base styles
      Object.assign(el.style, {
        left: node.x+'px', top: node.y+'px',
        transform: 'translate(-50%,-50%)',
        padding: central?'17px 28px':'12px 18px',
        borderRadius: central?'20px':'15px',
        background: central?accent:'#fff',
        color: central?'#fff':'#22262d',
        border: central?`1px solid ${accent}`:'1px solid #e4e4e1',
        minWidth: central?'182px':'118px',
        maxWidth: central?'264px':'212px',
        cursor: editing?'text':'grab',
        userSelect: editing?'text':'none',
        zIndex: (editing||sel)?'40':'12',
        boxShadow: central
          ? (sel?'0 0 0 3px rgba(58,74,99,.32),0 10px 26px rgba(20,24,32,.18)':'0 8px 22px rgba(20,24,32,.16)')
          : (sel?`0 0 0 2px ${accent},0 8px 20px rgba(20,24,32,.12)`:'0 2px 7px rgba(20,24,32,.08)'),
      });

      // Don't rewrite innerHTML if this node's input is focused
      const nodeHasFocus = el.contains(focusedEl);
      if(nodeHasFocus && editing) {
        // Update draft from focused textarea
        if(focusedEl.tagName==='TEXTAREA') this.draft=focusedEl.value;
        continue;
      }

      // Build innerHTML
      const fs_title = central?'18px':'15px';
      const fs_sub = central?'12.5px':'11.5px';
      const col_title = central?'#fff':'#22262d';
      const col_sub = central?'rgba(255,255,255,.82)':'#6b7280';
      const maxW = central?'232px':'184px';
      const editBase = `border:none;background:transparent;outline:none;padding:0;margin:0;text-align:center;min-width:48px;max-width:${maxW};display:block;width:100%`;

      let html='';
      if(editing&&editingField==='title') {
        html+=`<textarea data-no-drag="1" style="${editBase};font-size:${fs_title};font-weight:600;line-height:1.22;letter-spacing:-0.01em;color:${col_title};white-space:pre-wrap;word-break:break-word" rows="1">${e(this.draft)}</textarea>`;
      } else {
        html+=`<div style="font-size:${fs_title};font-weight:600;line-height:1.22;letter-spacing:-0.01em;white-space:pre-wrap;word-break:break-word">${e(node.title||'')}</div>`;
      }

      if(editing&&editingField==='subtitle') {
        html+=`<textarea data-no-drag="1" placeholder="Add a subtitle" style="${editBase};font-size:${fs_sub};font-weight:500;line-height:1.25;margin-top:1px;color:${col_sub}" rows="1">${e(this.draft)}</textarea>`;
      } else if(node.subtitle) {
        html+=`<div data-field="subtitle" style="font-size:${fs_sub};font-weight:500;line-height:1.25;margin-top:1px;white-space:pre-wrap;word-break:break-word;color:${col_sub};cursor:pointer">${e(node.subtitle)}</div>`;
      }

      el.innerHTML = html;

      if(editing) {
        const ta = el.querySelector('textarea');
        if(ta) {
          ta.addEventListener('input', ev => { this.draft=ev.target.value; });
          ta.addEventListener('keydown', ev => this.onDraftKey(ev));
          ta.addEventListener('blur', () => this.commitEdit());
          ta.focus();
          ta.setSelectionRange(ta.value.length, ta.value.length);
        }
      }
    }

    // Measure sizes after paint
    requestAnimationFrame(() => {
      let changed=false;
      const sizes={...this.s.sizes};
      for(const n of this.s.nodes) {
        const el=this.nodeEls[n.id]; if(!el) continue;
        const w=el.offsetWidth, h=el.offsetHeight;
        const p=sizes[n.id];
        if(!p||Math.abs(p.w-w)>0.5||Math.abs(p.h-h)>0.5){sizes[n.id]={w,h};changed=true;}
      }
      if(changed) { Object.assign(this.s, {sizes}); this.renderEdges(); }
    });
  }

  renderToolbar() {
    const {selectedNodeId, editingNodeId, linking, linkMenuNode} = this.s;
    const tb = $('toolbar');
    if(!selectedNodeId || editingNodeId || linking || linkMenuNode) { tb.style.display='none'; return; }
    const node = this.nodeById(selectedNodeId); if(!node) { tb.style.display='none'; return; }

    // Calculate screen position
    const canvas=$('canvas'), r=canvas.getBoundingClientRect();
    const sz=this.sizeOf(node);
    const screenX=r.left+this.pan.x+node.x*this.zoom;
    const screenY=r.top+this.pan.y+node.y*this.zoom-(sz.h/2)*this.zoom-9;

    // Position relative to canvas
    const cx=this.pan.x+node.x*this.zoom;
    const cy=this.pan.y+node.y*this.zoom-(sz.h/2)*this.zoom-9;

    tb.style.display='flex';
    tb.style.gap='2px';
    tb.style.left=cx+'px';
    tb.style.top=cy+'px';
    tb.style.transform='translateX(-50%) translateY(-100%)';

    let h='';
    if(node.kind!=='central') h+=`<button class="btn-tool" data-action="details">Details</button>`;
    h+=`<button class="btn-tool" data-action="subtitle">Subtitle</button>`;
    h+=`<button class="btn-tool" data-action="link">Link</button>`;
    h+=`<button class="btn-tool danger" data-action="delete">Delete</button>`;
    tb.innerHTML=h;

    tb.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('pointerdown', ev => ev.stopPropagation());
      btn.addEventListener('click', ev => {
        ev.stopPropagation();
        const id=selectedNodeId;
        switch(btn.dataset.action){
          case 'details': this.openDetail(id); break;
          case 'subtitle': this.startEdit(id,'subtitle'); break;
          case 'link': this.startLinking(id); break;
          case 'delete': this.deleteNode(id); break;
        }
      });
    });
  }

  renderDetailPane() {
    const {detailNodeId} = this.s;
    const dp = $('detail-pane');

    if(!detailNodeId) { dp.style.display='none'; return; }
    const node = this.nodeById(detailNodeId);
    if(!node||node.kind==='central') { dp.style.display='none'; return; }

    // Don't re-render if an input in the detail pane has focus
    const ae=document.activeElement;
    if(dp.contains(ae)&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA')) return;

    dp.style.display='flex';
    dp.style.flexDirection='column';

    const typeColors={social_media:'#c0892d',direct_engagement:'#2f7d5b',transparency:'#3a4a63',economic:'#b04a3f'};
    const typeLabels={social_media:'Social',direct_engagement:'Direct',transparency:'Transparency',economic:'Economic'};
    const statusBgs={planned:'#eef1f5',in_progress:'#f0f3ed',completed:'#eef5f1'};
    const statusFgs={planned:'#3a4a63',in_progress:'#5f6e3f',completed:'#2f7d5b'};
    const statusLabels={planned:'Planned',in_progress:'In Progress',completed:'Completed'};

    let sgs='';
    for(const sg of (node.subGroups||[])) {
      sgs+=`<div style="border:1px solid #e4e4e1;border-radius:9px;padding:9px 10px;background:#fafaf8">
        <div style="display:flex;align-items:flex-start;gap:7px">
          <input value="${e(sg.name)}" data-sg="${sg.id}" data-field="name" placeholder="Name this sub-group" style="flex:1;min-width:0;border:none;background:transparent;font-size:12px;font-weight:700;color:#22262d;outline:none;padding:2px 4px;border-radius:5px">
          <button data-del-sg="${sg.id}" style="flex:none;border:none;background:transparent;color:#b3b3ac;font-size:14px;cursor:pointer;padding:2px">×</button>
        </div>
        <textarea data-sg="${sg.id}" data-field="role" placeholder="Add context — key people, organizations, what they care about…" rows="2" style="width:100%;margin-top:3px;border:none;background:transparent;font-size:11px;font-weight:500;color:#6b7280;line-height:1.35;outline:none;padding:2px 4px;border-radius:5px;resize:none;field-sizing:content;min-height:20px">${e(sg.role||'')}</textarea>
      </div>`;
    }

    let ivs='';
    for(const iv of (node.interventions||[])) {
      const tc=typeColors[iv.type]||'#9a9a93', tl=typeLabels[iv.type]||'Action';
      const sbg=statusBgs[iv.status]||'#f0f0ed', sfg=statusFgs[iv.status]||'#6b7280', sl=statusLabels[iv.status]||'Unknown';
      ivs+=`<div style="border:1px solid #e4e4e1;border-radius:9px;padding:9px 10px;background:#fafaf8">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
          <button data-cycle-type="${iv.id}" style="flex:none;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:${tc};color:#fff;padding:3px 7px;border-radius:5px;border:none;cursor:pointer">${tl}</button>
          <button data-cycle-status="${iv.id}" style="flex:none;font-size:9px;font-weight:600;padding:3px 7px;border-radius:5px;border:none;cursor:pointer;background:${sbg};color:${sfg}">${sl}</button>
          <span style="flex:1"></span>
          <button data-del-iv="${iv.id}" style="flex:none;border:none;background:transparent;color:#b3b3ac;font-size:14px;cursor:pointer;padding:2px">×</button>
        </div>
        <input value="${e(iv.title||'')}" data-iv="${iv.id}" data-field="title" placeholder="Name this action" style="width:100%;border:none;background:transparent;font-size:12px;font-weight:700;color:#22262d;outline:none;padding:2px 4px;border-radius:5px">
        <textarea data-iv="${iv.id}" data-field="description" placeholder="Describe the action and the perception shift it targets…" rows="2" style="width:100%;margin-top:2px;border:none;background:transparent;font-size:11px;font-weight:500;color:#6b7280;line-height:1.35;outline:none;padding:2px 4px;border-radius:5px;resize:none;field-sizing:content;min-height:20px">${e(iv.description||'')}</textarea>
      </div>`;
    }

    dp.innerHTML=`
      <div style="flex:none;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;border-bottom:1px solid #e4e4e1">
        <div style="display:flex;flex-direction:column;line-height:1.15">
          <span style="font-size:13px;font-weight:700">${e(node.title)}</span>
          <span style="font-size:10.5px;font-weight:500;color:#9a9a93">${e(node.subtitle||'')}</span>
        </div>
        <button id="dp-close" style="border:none;background:transparent;color:#9a9a93;font-size:16px;cursor:pointer;padding:4px">×</button>

        <div style="font-size:11px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px">Sub-groups</div>
        <div id="dp-sgs" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
          ${sgs}
          <button id="dp-add-sg" style="width:100%;border:1px dashed #cdcdc6;background:transparent;color:#6b7280;font-size:11px;font-weight:600;padding:7px;border-radius:8px;cursor:pointer">+ Add sub-group</button>

        <div style="font-size:11px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px">NextEra Interventions</div>

    $('dp-add-iv').onclick=()=>this.addIntervention(detailNodeId);

    dp.querySelectorAll('[data-sg]').forEach(inp=>{

        this.updateSubGroup(detailNodeId, inp.dataset.sg, {[inp.dataset.field]:ev.target.value});

        this.updateIntervention(detailNodeId, inp.dataset.iv, {[inp.dataset.field]:ev.target.value});
      });

    dp.querySelectorAll('[data-del-sg]').forEach(btn=>{
      btn.onclick=ev=>{ev.stopPropagation();this.deleteSubGroup(detailNodeId,btn.dataset.delSg);};

    dp.querySelectorAll('[data-del-iv]').forEach(btn=>{
      btn.onclick=ev=>{ev.stopPropagation();this.deleteIntervention(detailNodeId,btn.dataset.delIv);};

    dp.querySelectorAll('[data-cycle-status]').forEach(btn=>{
      btn.onclick=ev=>{ev.stopPropagation();this.cycleStatus(detailNodeId,btn.dataset.cycleStatus);};

      const ivs2=node.interventions||[], lastIv=ivs2[ivs2.length-1];

        requestAnimationFrame(()=>{ const inp=dp.querySelector(`[data-iv="${lastIv.id}"][data-field="title"]`); if(inp) inp.focus(); });

          </div>
        </div>`;
      }
      rows+=`<button id="add-type-btn" style="width:100%;margin-top:11px;border:1px dashed #cdcdc6;background:transparent;color:#6b7280;font-size:12px;font-weight:600;padding:9px;border-radius:9px;cursor:pointer">+ Add relationship type</button>`;
    }

    lg.innerHTML=`
      <button id="legend-toggle" style="flex:none;display:flex;align-items:center;justify-content:space-between;width:100%;border:none;background:transparent;padding:13px 15px;cursor:pointer">
        <span style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.2">
          <span style="font-size:13px;font-weight:700;color:#22262d">Relationship key</span>
          <span style="font-size:10.5px;font-weight:500;color:#9a9a93">Click a row to use it for new links</span>
        </span>
        <span style="font-size:15px;color:#9a9a93;display:inline-block;transform:${chevRot};transition:transform .18s">${chev}</span>
      </button>
      ${legendOpen?`<div style="overflow-y:auto;padding:0 15px 13px">${rows}</div>`:''}`;

    const tog=$('legend-toggle');
    if(tog) tog.onclick=()=>this.set(s=>({legendOpen:!s.legendOpen}));

    const abt=$('add-type-btn');
    if(abt) abt.onclick=()=>this.addLineType();

    lg.querySelectorAll('[data-activate]').forEach(btn=>{
      btn.onclick=()=>this.set({activeTypeId:btn.dataset.activate});
    });
    lg.querySelectorAll('[data-del-type]').forEach(btn=>{
      btn.onclick=()=>this.deleteLineType(btn.dataset.delType);
    });
    lg.querySelectorAll('[data-type-label]').forEach(inp=>{
      inp.addEventListener('input', ev=>this.updateType(inp.dataset.typeLabel,{label:ev.target.value}));
    });
    lg.querySelectorAll('[data-type-color]').forEach(inp=>{
      inp.addEventListener('input', ev=>this.updateType(inp.dataset.typeColor,{color:ev.target.value}));
    });
    lg.querySelectorAll('[data-type-weight]').forEach(sel=>{
      sel.addEventListener('change', ev=>this.updateType(sel.dataset.typeWeight,{weight:parseFloat(ev.target.value)}));
    });
    lg.querySelectorAll('[data-style]').forEach(btn=>{
      btn.onclick=()=>this.updateType(btn.dataset.type,{dash:btn.dataset.style});
    });
  }
}

const app = new App();
app.init();
</script>
</body>
</html>
