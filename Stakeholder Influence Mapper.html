document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: url(\"b4670210-a0a7-4f00-a80a-6e3f72a404e8\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e92723a2-ea65-45e4-a293-b1ffdafeab11\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"501a612b-4f97-4503-9403-57e5bb6111ea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"9c17137f-433d-4b6d-bf0e-b9dc14455caf\"><\u002Fscript>\n  <script src=\"ca44227c-adc7-400c-a02b-8eea75e53b6a\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box}\n    html,body{margin:0;height:100%}\n    input,textarea,select,button{font-family:inherit}\n    ::-webkit-scrollbar{width:10px;height:10px}\n    ::-webkit-scrollbar-thumb{background:#cfcfca;border-radius:6px}\n    ::-webkit-scrollbar-track{background:transparent}\n    @keyframes smoothZoom{from{opacity:0.95}to{opacity:1}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div data-screen-label=\"Stakeholder Influence Mapper\" style=\"height:100vh;display:flex;flex-direction:column;font-family:'Public Sans',system-ui,-apple-system,sans-serif;color:#22262d;background:#f4f4f2\">\n\n  <div style=\"flex:none;height:60px;display:flex;align-items:center;gap:16px;padding:0 18px;background:#fff;border-bottom:1px solid #e4e4e1;z-index:50\">\n    <div style=\"display:flex;flex-direction:column;line-height:1.18\">\n      <span style=\"font-size:15px;font-weight:700;letter-spacing:-0.01em\">{{ projectTitle }}<\u002Fspan>\n      <span style=\"font-size:11.5px;font-weight:500;color:#6b7280\">{{ projectSub }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <button onclick=\"{{ toggleActions }}\" style=\"{{ actionsBtnStyle }}\" style-hover=\"filter:brightness(0.93)\">⬡ NEER Actions<\u002Fbutton>\n    <button onclick=\"{{ openImport }}\" style=\"display:flex;align-items:center;gap:7px;border:1px solid #d6e0f0;background:#f2f6fd;color:#2a6fdb;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px;cursor:pointer\" style-hover=\"background:#e6effb\">↑ Import .xlsx<\u002Fbutton>\n    <button onclick=\"{{ toggleFilter }}\" style=\"{{ filterBtnStyle }}\" style-hover=\"filter:brightness(0.97)\">⚲ Filter &amp; sort{{ filterCountLabel }}<\u002Fbutton>\n    <input ref=\"{{ setFileInput }}\" type=\"file\" accept=\".xlsx\" onchange=\"{{ onFile }}\" style=\"display:none\">\n  <\u002Fdiv>\n\n  <div ref=\"{{ setContainer }}\" onpointerdown=\"{{ onCanvasDown }}\" style=\"{{ canvasStyle }}\">\n\n    <svg style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:5;pointer-events:none;transform:translate({{ pan.x }}px, {{ pan.y }}px) scale({{ zoom }});transform-origin:0 0;will-change:transform;transition:{{ mapTransition }}\">\n      <sc-for list=\"{{ edgeViews }}\" as=\"ed\" hint-placeholder-count=\"6\">\n        <g>\n          <line x1=\"{{ ed.x1 }}\" y1=\"{{ ed.y1 }}\" x2=\"{{ ed.x2 }}\" y2=\"{{ ed.y2 }}\" style=\"{{ ed.hitStyle }}\" onclick=\"{{ ed.onClick }}\"><\u002Fline>\n          <sc-if value=\"{{ ed.selected }}\"><line x1=\"{{ ed.x1 }}\" y1=\"{{ ed.y1 }}\" x2=\"{{ ed.x2 }}\" y2=\"{{ ed.y2 }}\" style=\"{{ ed.haloStyle }}\"><\u002Fline><\u002Fsc-if>\n          <line x1=\"{{ ed.x1 }}\" y1=\"{{ ed.y1 }}\" x2=\"{{ ed.x2 }}\" y2=\"{{ ed.y2 }}\" style=\"{{ ed.lineStyle }}\"><\u002Fline>\n        <\u002Fg>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ linkLine }}\"><line x1=\"{{ linkLine.x1 }}\" y1=\"{{ linkLine.y1 }}\" x2=\"{{ linkLine.x2 }}\" y2=\"{{ linkLine.y2 }}\" style=\"{{ linkLine.style }}\"><\u002Fline><\u002Fsc-if>\n      <sc-for list=\"{{ orgEdgeViews }}\" as=\"oe\" hint-placeholder-count=\"4\">\n        <line x1=\"{{ oe.x1 }}\" y1=\"{{ oe.y1 }}\" x2=\"{{ oe.x2 }}\" y2=\"{{ oe.y2 }}\" style=\"{{ oe.lineStyle }}\"><\u002Fline>\n      <\u002Fsc-for>\n      <sc-for list=\"{{ personEdgeViews }}\" as=\"pe\" hint-placeholder-count=\"4\">\n        <line x1=\"{{ pe.x1 }}\" y1=\"{{ pe.y1 }}\" x2=\"{{ pe.x2 }}\" y2=\"{{ pe.y2 }}\" style=\"{{ pe.lineStyle }}\"><\u002Fline>\n      <\u002Fsc-for>\n      <sc-for list=\"{{ actionEdgeViews }}\" as=\"ae\" hint-placeholder-count=\"0\">\n        <line x1=\"{{ ae.x1 }}\" y1=\"{{ ae.y1 }}\" x2=\"{{ ae.x2 }}\" y2=\"{{ ae.y2 }}\" style=\"{{ ae.lineStyle }}\"><\u002Fline>\n      <\u002Fsc-for>\n    <\u002Fsvg>\n\n    <div style=\"position:absolute;inset:0;pointer-events:none;z-index:10;will-change:transform;transform:translate({{ pan.x }}px, {{ pan.y }}px) scale({{ zoom }});transform-origin:0 0;transition:{{ mapTransition }}\">\n\n      <sc-for list=\"{{ catViews }}\" as=\"cat\" hint-placeholder-count=\"7\">\n        <div ref=\"{{ cat.ref }}\" style=\"{{ cat.style }}\" onpointerdown=\"{{ cat.onPointerDown }}\" ondoubleclick=\"{{ cat.onDbl }}\">\n          <div style=\"{{ cat.titleStyle }}\">{{ cat.title }}<\u002Fdiv>\n          <div style=\"{{ cat.subStyle }}\">{{ cat.sub }}<\u002Fdiv>\n          <sc-if value=\"{{ cat.hasPips }}\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:5px\">\n              <sc-for list=\"{{ cat.pips }}\" as=\"pip\" hint-placeholder-count=\"2\">\n                <span style=\"display:flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:{{ pip.color }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ pip.color }}\"><\u002Fspan>{{ pip.count }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ orgViews }}\" as=\"org\" hint-placeholder-count=\"5\">\n        <div style=\"{{ org.style }}\" onpointerdown=\"{{ org.onDragStart }}\" onclick=\"{{ org.onClick }}\">\n          <div style=\"display:flex;align-items:center;gap:6px\">\n            <span style=\"flex:none;width:8px;height:8px;border-radius:50%;background:{{ org.dotColor }}\"><\u002Fspan>\n            <span style=\"flex:1;min-width:0;font-size:12px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ org.name }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:4px\">\n            <span style=\"font-size:10px;font-weight:600;color:#8a8a83\">{{ org.countLabel }}<\u002Fspan>\n            <div style=\"display:flex;gap:2px\">\n              <sc-for list=\"{{ org.sentDots }}\" as=\"sd\" hint-placeholder-count=\"3\">\n                <span style=\"width:6px;height:6px;border-radius:50%;background:{{ sd.color }}\"><\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ personViews }}\" as=\"pn\" hint-placeholder-count=\"5\">\n        <div style=\"{{ pn.style }}\" onpointerdown=\"{{ pn.onDragStart }}\" onclick=\"{{ pn.onClick }}\">\n          <span style=\"position:absolute;top:7px;right:8px;width:9px;height:9px;border-radius:50%;background:{{ pn.prColor }};border:1.5px solid #fff;box-shadow:0 0 0 1px {{ pn.prRing }}\"><\u002Fspan>\n          <div style=\"font-size:12px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;padding-right:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ pn.name }}<\u002Fdiv>\n          <sc-if value=\"{{ pn.hasTitle }}\"><div style=\"font-size:10px;font-weight:500;line-height:1.25;margin-top:2px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ pn.title }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ actionViews }}\" as=\"av\" hint-placeholder-count=\"0\">\n        <div style=\"{{ av.style }}\" onpointerdown=\"{{ av.onPointerDown }}\" onclick=\"{{ av.onClick }}\">\n          <div style=\"font-size:12.5px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;color:#1a3a6e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ av.name }}<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:600;color:#5580c8;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ av.catLabel }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:4px;margin-top:5px\">\n            <span style=\"width:6px;height:6px;border-radius:50%;background:{{ av.statusColor }};flex:none\"><\u002Fspan>\n            <span style=\"font-size:10px;font-weight:600;color:{{ av.statusColor }}\">{{ av.statusLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ linkingActive }}\">\n      <div style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:70;background:#22262d;color:#fff;font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;box-shadow:0 6px 18px rgba(20,24,32,.22)\">Click another segment to connect · Esc to cancel<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-for list=\"{{ catViews }}\" as=\"cat\" hint-placeholder-count=\"7\">\n      <sc-if value=\"{{ cat.toolbarVisible }}\">\n        <div style=\"position:absolute;left:{{ cat.toolbarX }}px;top:{{ cat.toolbarY }}px;z-index:60;display:flex;gap:2px;background:#fff;border:1px solid #e4e4e1;border-radius:9px;padding:4px;box-shadow:0 6px 18px rgba(20,24,32,.14);white-space:nowrap\" onpointerdown=\"{{ stop }}\">\n          <button data-no-drag=\"1\" onclick=\"{{ cat.onExpandBtn }}\" style=\"border:none;background:transparent;color:#2a6fdb;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#eef3fc\">{{ cat.expandLabel }}<\u002Fbutton>\n          <button data-no-drag=\"1\" onclick=\"{{ cat.onLinkBtn }}\" style=\"border:none;background:transparent;color:#22262d;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#f0f0ed\">Link<\u002Fbutton>\n          <button data-no-drag=\"1\" onclick=\"{{ cat.onActionBtn }}\" style=\"border:none;background:#eef3fb;color:#2a6fdb;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#dce9f8\">NEER Action<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-for>\n\n    <sc-if value=\"{{ edgePopover }}\">\n      <div style=\"{{ edgePopover.style }}\" onpointerdown=\"{{ stop }}\">\n        <div onpointerdown=\"{{ edgePopover.onDragStart }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin:-11px -11px 7px;padding:8px 10px;border-bottom:1px solid #f0f0ed;cursor:grab;border-radius:11px 11px 0 0\">\n          <span style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase\">Connection type<\u002Fspan>\n          <button onclick=\"{{ edgePopover.onClose }}\" style=\"flex:none;border:none;background:#f2f2ef;color:#6b7280;width:20px;height:20px;border-radius:6px;font-size:13px;line-height:1;cursor:pointer\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px\">\n          <sc-for list=\"{{ edgePopover.chips }}\" as=\"chip\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">\n              <span style=\"{{ chip.preview }}\"><\u002Fspan>\n              <span style=\"flex:1;text-align:left\">{{ chip.label }}<\u002Fspan>\n              <sc-if value=\"{{ chip.active }}\"><span style=\"color:#3a4a63;font-weight:700\">✓<\u002Fspan><\u002Fsc-if>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ edgePopover.onDelete }}\" style=\"margin-top:8px;width:100%;border:1px solid #ecdad7;background:#fbf2f1;color:#b04a3f;font-size:12px;font-weight:600;padding:7px;border-radius:8px;cursor:pointer\">Delete connection<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:56;display:flex;gap:8px;align-items:center;font-size:11px;font-weight:600;color:#9a9a93\">\n      <button onclick=\"{{ resetView }}\" onpointerdown=\"{{ stop }}\" style=\"background:#fff;border:1px solid #e4e4e1;border-radius:9px;padding:6px 12px;box-shadow:0 2px 7px rgba(20,24,32,.08);cursor:pointer;color:#22262d;font-weight:600\" style-hover=\"background:#f6f6f3\">⤢ Reset view<\u002Fbutton>\n      <div style=\"background:#fff;border:1px solid #e4e4e1;border-radius:9px;padding:6px 12px;box-shadow:0 2px 7px rgba(20,24,32,.08)\">{{ zoomText }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isEmpty }}\">\n      <div style=\"position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center\">\n        <div onpointerdown=\"{{ stop }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:14px;background:#fff;border:1px solid #e4e4e1;border-radius:16px;padding:34px 40px;box-shadow:0 14px 40px rgba(20,24,32,.12);max-width:420px;text-align:center\">\n          <div style=\"font-size:30px\">🗺️<\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:700;color:#22262d\">No stakeholders loaded<\u002Fdiv>\n          <div style=\"font-size:12.5px;font-weight:500;color:#6b7280;line-height:1.5\">Import a monday.com stakeholder export (.xlsx). The map builds automatically — segments become categories, organizations and people nest inside.<\u002Fdiv>\n          <button onclick=\"{{ openImport }}\" style=\"margin-top:4px;border:none;background:#2a6fdb;color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:10px;cursor:pointer\" style-hover=\"background:#245fc0\">Import spreadsheet<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ importError }}\">\n      <div style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:95;background:#fbf2f1;border:1px solid #ecdad7;color:#b04a3f;font-size:12px;font-weight:600;padding:9px 16px;border-radius:10px;box-shadow:0 6px 18px rgba(20,24,32,.16)\">{{ importError }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ filterOpen }}\">\n      <div onpointerdown=\"{{ stop }}\" style=\"position:absolute;left:18px;top:18px;bottom:18px;z-index:58;width:280px;display:flex;flex-direction:column;background:#fff;border:1px solid #e4e4e1;border-radius:13px;box-shadow:0 10px 34px rgba(20,24,32,.14);overflow:hidden\">\n        <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #eeeeeb\">\n          <span style=\"font-size:13px;font-weight:700\">Filter &amp; sort<\u002Fspan>\n          <button onclick=\"{{ toggleFilter }}\" style=\"border:none;background:transparent;color:#9a9a93;font-size:16px;cursor:pointer\" style-hover=\"color:#22262d\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow-y:auto;flex:1;padding:13px 15px\">\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px\">Sort within groups<\u002Fdiv>\n          <select value=\"{{ sortBy }}\" onchange=\"{{ onSort }}\" style=\"width:100%;font-size:12.5px;font-weight:600;border:1px solid #e4e4e1;border-radius:8px;padding:7px 9px;background:#fff;color:#22262d;cursor:pointer\">\n            <option value=\"priority\">Priority (high → low)<\u002Foption>\n            <option value=\"people\">Number of people<\u002Foption>\n            <option value=\"name\">Name (A → Z)<\u002Foption>\n          <\u002Fselect>\n\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px\">Priority<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ priorityFilters }}\" as=\"pf\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ pf.onToggle }}\" style=\"{{ pf.rowStyle }}\">\n                <span style=\"flex:none;width:11px;height:11px;border-radius:50%;background:{{ pf.color }}\"><\u002Fspan>\n                <span style=\"flex:1;text-align:left;font-size:12px;font-weight:600\">{{ pf.label }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;color:#9a9a93\">{{ pf.count }}<\u002Fspan>\n                <span style=\"{{ pf.checkStyle }}\">✓<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px\">Sentiment<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ sentimentFilters }}\" as=\"sf\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ sf.onToggle }}\" style=\"{{ sf.rowStyle }}\">\n                <span style=\"flex:none;width:11px;height:11px;border-radius:50%;background:{{ sf.color }}\"><\u002Fspan>\n                <span style=\"flex:1;text-align:left;font-size:12px;font-weight:600\">{{ sf.label }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;color:#9a9a93\">{{ sf.count }}<\u002Fspan>\n                <span style=\"{{ sf.checkStyle }}\">✓<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px\">Segments<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ segmentFilters }}\" as=\"gf\" hint-placeholder-count=\"6\">\n              <button onclick=\"{{ gf.onToggle }}\" style=\"{{ gf.rowStyle }}\">\n                <span style=\"flex:none;width:11px;height:11px;border-radius:3px;background:{{ gf.color }}\"><\u002Fspan>\n                <span style=\"flex:1;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ gf.label }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;color:#9a9a93\">{{ gf.count }}<\u002Fspan>\n                <span style=\"{{ gf.checkStyle }}\">✓<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:none;padding:11px 15px;border-top:1px solid #eeeeeb\">\n          <button onclick=\"{{ resetFilters }}\" style=\"width:100%;border:1px solid #e4e4e1;background:#fafaf8;color:#6b7280;font-size:12px;font-weight:600;padding:8px;border-radius:8px;cursor:pointer\" style-hover=\"background:#f2f2ef\">Reset filters<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasActionPane }}\">\n      <div onpointerdown=\"{{ stop }}\" style=\"position:absolute;right:18px;top:18px;bottom:18px;z-index:68;width:316px;display:flex;flex-direction:column;background:#fff;border:1px solid #dce9f8;border-top:3px solid #2a6fdb;border-radius:13px;box-shadow:0 10px 34px rgba(42,111,219,.2);overflow:hidden\">\n        <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #eeeeeb\">\n          <span style=\"font-size:13px;font-weight:700;color:#2a6fdb\">{{ actionPaneView.title }}<\u002Fspan>\n          <button onclick=\"{{ actionPaneView.onClose }}\" style=\"border:none;background:#f2f2ef;color:#6b7280;width:22px;height:22px;border-radius:6px;font-size:14px;line-height:1;cursor:pointer\" style-hover=\"color:#22262d\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow-y:auto;flex:1;padding:14px 15px;display:flex;flex-direction:column;gap:14px\">\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px\">Action name *<\u002Fdiv>\n            <div style=\"position:relative\">\n              <input value=\"{{ actionPaneView.name }}\" onchange=\"{{ actionPaneView.onName }}\" placeholder=\"e.g. Meeting with county commissioners\" style=\"width:100%;font-size:13px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:8px 10px;outline:none;color:#22262d;box-sizing:border-box;font-family:inherit\">\n              <sc-if value=\"{{ actionPaneView.hasMentionInName }}\">\n                <div style=\"position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:22;background:#fff;border:1px solid #dce9f8;border-radius:9px;box-shadow:0 6px 18px rgba(42,111,219,.18);overflow:hidden\">\n                  <sc-for list=\"{{ actionPaneView.mentionResults }}\" as=\"mr\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ mr.onSelect }}\" style=\"display:flex;align-items:center;gap:8px;width:100%;border:none;border-bottom:1px solid #f0f5ff;background:transparent;padding:7px 10px;cursor:pointer;font-family:inherit\" style-hover=\"background:#eef3fb\">\n                      <span style=\"flex:none;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:#eef3fb;color:#2a6fdb\">{{ mr.typeLabel }}<\u002Fspan>\n                      <span style=\"font-size:12.5px;font-weight:500;color:#22262d;text-align:left\">{{ mr.name }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">Category<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:5px\">\n              <sc-for list=\"{{ actionPaneView.categories }}\" as=\"ac\" hint-placeholder-count=\"7\">\n                <button onclick=\"{{ ac.onSelect }}\" style=\"{{ ac.style }}\">{{ ac.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ actionPaneView.isCustom }}\">\n              <input value=\"{{ actionPaneView.customCategory }}\" onchange=\"{{ actionPaneView.onCustomCat }}\" placeholder=\"Describe this action type…\" style=\"width:100%;margin-top:7px;font-size:12.5px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:7px 10px;outline:none;color:#22262d;box-sizing:border-box;font-family:inherit\">\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">Status<\u002Fdiv>\n            <div style=\"display:flex;gap:5px\">\n              <sc-for list=\"{{ actionPaneView.statuses }}\" as=\"ast\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ ast.onSelect }}\" style=\"{{ ast.style }}\">\n                  <span style=\"width:6px;height:6px;border-radius:50%;background:{{ ast.color }};flex:none\"><\u002Fspan>\n                  {{ ast.label }}\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px\">Description / notes<\u002Fdiv>\n            <div style=\"position:relative\">\n              <textarea value=\"{{ actionPaneView.description }}\" onchange=\"{{ actionPaneView.onDesc }}\" placeholder=\"What is the plan for this action?\" rows=\"3\" style=\"width:100%;font-size:12.5px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:8px 10px;outline:none;color:#22262d;resize:vertical;font-family:inherit;line-height:1.45;box-sizing:border-box\"><\u002Ftextarea>\n              <sc-if value=\"{{ actionPaneView.hasMentionInDesc }}\">\n                <div style=\"position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:22;background:#fff;border:1px solid #dce9f8;border-radius:9px;box-shadow:0 6px 18px rgba(42,111,219,.18);overflow:hidden\">\n                  <sc-for list=\"{{ actionPaneView.mentionResults }}\" as=\"mr\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ mr.onSelect }}\" style=\"display:flex;align-items:center;gap:8px;width:100%;border:none;border-bottom:1px solid #f0f5ff;background:transparent;padding:7px 10px;cursor:pointer;font-family:inherit\" style-hover=\"background:#eef3fb\">\n                      <span style=\"flex:none;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:#eef3fb;color:#2a6fdb\">{{ mr.typeLabel }}<\u002Fspan>\n                      <span style=\"font-size:12.5px;font-weight:500;color:#22262d;text-align:left\">{{ mr.name }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px\">Link to stakeholders<\u002Fdiv>\n            <input value=\"{{ actionPaneView.search }}\" onchange=\"{{ actionPaneView.onSearch }}\" placeholder=\"Search orgs &amp; people…\" style=\"width:100%;font-size:12.5px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:7px 10px;outline:none;color:#22262d;box-sizing:border-box;font-family:inherit\">\n            <sc-if value=\"{{ actionPaneView.hasSearchResults }}\">\n              <div style=\"margin-top:5px;border:1px solid #e4e4e1;border-radius:8px;overflow:hidden\">\n                <sc-for list=\"{{ actionPaneView.searchResults }}\" as=\"sr\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ sr.onToggle }}\" style=\"{{ sr.rowStyle }}\">\n                    <span style=\"flex:none;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:#eef3fb;color:#2a6fdb\">{{ sr.typeLabel }}<\u002Fspan>\n                    <span style=\"flex:1;font-size:12px;font-weight:500;color:#22262d;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ sr.name }}<\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:700;color:{{ sr.checkColor }}\">{{ sr.checkMark }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ actionPaneView.hasLinked }}\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:4px;margin-top:7px\">\n                <sc-for list=\"{{ actionPaneView.linkedItems }}\" as=\"li\" hint-placeholder-count=\"1\">\n                  <button onclick=\"{{ li.onRemove }}\" style=\"display:flex;align-items:center;gap:4px;border:1px solid #dce9f8;background:#eef3fb;color:#2a6fdb;font-size:11px;font-weight:600;padding:3px 8px 3px 10px;border-radius:999px;cursor:pointer;font-family:inherit\" style-hover=\"background:#dce9f8\">\n                    {{ li.name }} <span style=\"opacity:.55;font-size:13px;line-height:1\">×<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n        <div style=\"flex:none;padding:11px 15px;border-top:1px solid #eeeeeb;display:flex;gap:8px\">\n          <sc-if value=\"{{ actionPaneView.isEdit }}\">\n            <button onclick=\"{{ actionPaneView.onDelete }}\" style=\"flex:none;border:1px solid #ecdad7;background:#fbf2f1;color:#b04a3f;font-size:12px;font-weight:600;padding:9px 13px;border-radius:9px;cursor:pointer;font-family:inherit\" style-hover=\"background:#f5e8e6\">Delete<\u002Fbutton>\n          <\u002Fsc-if>\n          <button onclick=\"{{ actionPaneView.onSave }}\" style=\"{{ actionPaneView.saveStyle }}\">Save action<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div onpointerdown=\"{{ stop }}\" style=\"position:absolute;right:18px;bottom:64px;z-index:55;width:228px;background:#fff;border:1px solid #e4e4e1;border-radius:12px;box-shadow:0 8px 24px rgba(20,24,32,.12);overflow:hidden\">\n      <button onclick=\"{{ toggleKey }}\" style=\"display:flex;align-items:center;justify-content:space-between;width:100%;border:none;background:transparent;padding:11px 13px;cursor:pointer\">\n        <span style=\"font-size:12px;font-weight:700;color:#22262d\">Key<\u002Fspan>\n        <span style=\"{{ keyChevron }}\">⌃<\u002Fspan>\n      <\u002Fbutton>\n      <sc-if value=\"{{ keyOpen }}\">\n        <div style=\"padding:0 13px 13px\">\n          <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">{{ colorByLabel }}<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:5px;margin-bottom:11px\">\n            <sc-for list=\"{{ keyColor }}\" as=\"kc\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"flex:none;width:12px;height:12px;border-radius:50%;background:{{ kc.color }}\"><\u002Fspan>\n                <span style=\"font-size:11px;font-weight:500;color:#374151\">{{ kc.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">Priority dot<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:5px;margin-bottom:11px\">\n            <sc-for list=\"{{ keyPriority }}\" as=\"kp\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"flex:none;width:10px;height:10px;border-radius:50%;background:{{ kp.color }};border:1.5px solid #fff;box-shadow:0 0 0 1px {{ kp.color }}\"><\u002Fspan>\n                <span style=\"font-size:11px;font-weight:500;color:#374151\">{{ kp.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">Levels<\u002Fdiv>\n          <div style=\"font-size:10.5px;font-weight:500;color:#6b7280;line-height:1.5\">Click a segment → <b style=\"color:#22262d\">Expand<\u002Fb> for orgs · click an org for its people · click a person for full details.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ personDialog }}\">\n      <div onpointerdown=\"{{ stop }}\" onclick=\"{{ closePerson }}\" style=\"position:absolute;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:rgba(20,24,32,.34)\">\n        <div onclick=\"{{ stop }}\" style=\"width:480px;max-width:calc(100% - 40px);max-height:calc(100% - 56px);display:flex;flex-direction:column;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(20,24,32,.34);overflow:hidden\">\n          <div style=\"flex:none;display:flex;align-items:flex-start;gap:13px;padding:18px 20px 15px;border-bottom:1px solid #eeeeeb;background:{{ personDialog.headerBg }}\">\n            <div style=\"flex:none;width:44px;height:44px;border-radius:50%;background:{{ personDialog.avatarBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700\">{{ personDialog.initials }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:2px\">\n              <span style=\"font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.2\">{{ personDialog.name }}<\u002Fspan>\n              <sc-if value=\"{{ personDialog.hasTitle }}\"><span style=\"font-size:12px;font-weight:500;color:#6b7280;line-height:1.3\">{{ personDialog.title }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <button onclick=\"{{ closePerson }}\" style=\"flex:none;border:none;background:rgba(255,255,255,.7);color:#6b7280;width:28px;height:28px;border-radius:8px;font-size:16px;line-height:1;cursor:pointer\" style-hover=\"color:#22262d\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"overflow-y:auto;flex:1;padding:16px 20px 20px\">\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px\">\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:{{ personDialog.prBg }};color:{{ personDialog.prFg }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ personDialog.prFg }}\"><\u002Fspan>{{ personDialog.prLabel }}<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:{{ personDialog.seBg }};color:{{ personDialog.seFg }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ personDialog.seFg }}\"><\u002Fspan>{{ personDialog.seLabel }}<\u002Fspan>\n              <sc-if value=\"{{ personDialog.hasStage }}\"><span style=\"font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:#eef1f5;color:#3a4a63\">{{ personDialog.stage }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px 16px\">\n              <sc-for list=\"{{ personDialog.fields }}\" as=\"f\" hint-placeholder-count=\"6\">\n                <div style=\"{{ f.wrapStyle }}\">\n                  <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px\">{{ f.label }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;font-weight:500;color:#22262d;line-height:1.4;word-break:break-word\">{{ f.value }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ personDialog.hasNotes }}\">\n              <div style=\"margin-top:16px\">\n                <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px\">Notes<\u002Fdiv>\n                <div style=\"font-size:12.5px;font-weight:500;color:#374151;line-height:1.5;white-space:pre-wrap;background:#fafaf8;border:1px solid #eeeeeb;border-radius:9px;padding:10px 12px\">{{ personDialog.notes }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ personDialog.hasOutputs }}\">\n              <div style=\"margin-top:12px\">\n                <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px\">Outputs<\u002Fdiv>\n                <div style=\"font-size:12.5px;font-weight:500;color:#374151;line-height:1.5;white-space:pre-wrap;background:#fafaf8;border:1px solid #eeeeeb;border-radius:9px;padding:10px 12px\">{{ personDialog.outputs }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;colorBy&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Sentiment&quot;,&quot;Priority&quot;],&quot;default&quot;:&quot;Sentiment&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.catEls = {};\n    this.actionEls = {};\n    this.container = null;\n    this.pan = {x:0, y:0};\n    this.zoom = 1;\n    this.drag = null; this.panDrag = null; this.popDrag = null; this.actionDrag = null; this.orgDrag = null; this.personDrag = null; this._orgDragMoved = null; this._personDragMoved = null;\n    this.ACTION_CATS = ['Direct meeting / briefing','Media outreach / press','Letter / formal correspondence','Public comment / testimony','Community event / town hall','Regulatory / legal filing','Custom'];\n    this.ACTION_STATUSES = [{id:'planned',label:'Planned',color:'#8a8a83'},{id:'in-progress',label:'In Progress',color:'#cf7a33'},{id:'done',label:'Done',color:'#2f8f63'}];\n    this.data = null; this.seg = {}; this.personById = {}; this.orgById = {}; this.catBySeg = {}; this.orgCat = {};\n    this.SEG_PALETTE = ['#7a5d3a','#3f6b52','#6b3f5d','#4a5a7a','#7a3f3f','#566b3a','#3a6b6b','#6b5a3a','#5a5a52'];\n    this.CENTRAL_COLOR = '#2a3a55';\n    this.STORE_KEY = 'ksim_v2';\n    this.PRIORITY = [\n      {rank:4, label:'Highest / Urgent', color:'#b04a3f'},\n      {rank:3, label:'High',             color:'#cf7a33'},\n      {rank:2, label:'Medium',           color:'#be9a2b'},\n      {rank:1, label:'Low',              color:'#6b8f4e'},\n      {rank:0, label:'Not started',      color:'#bdbdb6'}\n    ];\n    this.SENT_GROUPS = [\n      {key:'opposed',    label:'Opposed',              color:'#bf6253'},\n      {key:'unscored',   label:'Neutral / Not scored', color:'#c5c5be'},\n      {key:'supportive', label:'Supportive',           color:'#2f8f63'}\n    ];\n    this.state = {\n      cats:[], edges:[], actions:[], actionPaneState:null, orgPositionOverrides:{}, personPositionOverrides:{}, ready:false, showActions:true,\n      lineTypes:[\n        {id:'t1', label:'Influence',  color:'#3a4a63', dash:'solid',  weight:2},\n        {id:'t2', label:'Pressure',   color:'#c0892d', dash:'dashed', weight:2},\n        {id:'t3', label:'Opposition', color:'#b04a3f', dash:'dotted', weight:2.5}\n      ],\n      activeTypeId:'t1',\n      sizes:{},\n      selectedNodeId:null, selectedEdgeId:null,\n      expandedCatId:null, expandedOrgId:null, personId:null,\n      filters:{ hidden:{}, pr:{4:true,3:true,2:true,1:true,0:true}, se:{opposed:true,unscored:true,supportive:true} },\n      sortBy:'priority', filterOpen:false, keyOpen:true,\n      linking:null, popOffset:{x:0,y:0}, importError:null\n    };\n    this.onWinMove = this.onWinMove.bind(this);\n    this.onWinUp = this.onWinUp.bind(this);\n    this.onKey = this.onKey.bind(this);\n  }\n\n  // ---------- lifecycle ----------\n  componentDidMount(){\n    window.addEventListener('pointermove', this.onWinMove);\n    window.addEventListener('pointerup', this.onWinUp);\n    window.addEventListener('keydown', this.onKey);\n    this.container.addEventListener('wheel', this.onWheel.bind(this), {passive:false});\n    if(!this.tryRestore()) this.trySeed(0);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('pointermove', this.onWinMove);\n    window.removeEventListener('pointerup', this.onWinUp);\n    window.removeEventListener('keydown', this.onKey);\n  }\n  componentDidUpdate(){ this.measure(); this.schedulePersist(); }\n\n  trySeed(attempt){\n    if(typeof window !== 'undefined' && window.KSIM_SEED){ this.loadData(window.KSIM_SEED); return; }\n    if(attempt < 25) setTimeout(() => this.trySeed(attempt+1), 120);\n  }\n  tryRestore(){\n    try {\n      const raw = localStorage.getItem(this.STORE_KEY);\n      if(!raw) return false;\n      const s = JSON.parse(raw);\n      if(!s || !s.data || !Array.isArray(s.data.segments)) return false;\n      this.buildIndexes(s.data);\n      this.data = s.data;\n      const cats = (s.cats && s.cats.length) ? s.cats : this.makeCats(s.data);\n      cats.forEach(c => this.catBySeg[c.segment] = c.id);\n      const hasPos = cats.some(c => c.x || c.y);\n      if(s.pan) this.pan = {x:s.pan.x||0, y:s.pan.y||0};\n      if(typeof s.zoom === 'number') this.zoom = s.zoom;\n      this.setState({\n        cats, ready: hasPos,\n        edges: s.edges || this.makeEdges(cats),\n        actions: s.actions || [],\n        orgPositionOverrides: s.orgPositionOverrides || {},\n        personPositionOverrides: s.personPositionOverrides || {},\n        lineTypes: s.lineTypes || this.state.lineTypes,\n        activeTypeId: s.activeTypeId || 't1',\n        filters: s.filters || this.state.filters,\n        sortBy: s.sortBy || 'priority'\n      }, () => { if(!hasPos){ this.pan={x:0,y:0}; this.zoom=1; requestAnimationFrame(() => this.relayout()); } });\n      return true;\n    } catch(_){ return false; }\n  }\n\n  persist(){\n    try {\n      const s = this.state;\n      localStorage.setItem(this.STORE_KEY, JSON.stringify({\n        data:this.data, cats:s.cats, edges:s.edges, lineTypes:s.lineTypes,\n        activeTypeId:s.activeTypeId, filters:s.filters, sortBy:s.sortBy,\n        pan:this.pan, zoom:this.zoom, actions:s.actions, orgPositionOverrides:s.orgPositionOverrides, personPositionOverrides:s.personPositionOverrides\n      }));\n    } catch(_){}\n  }\n  schedulePersist(){ clearTimeout(this._pt); this._pt = setTimeout(() => this.persist(), 350); }\n\n  // ---------- data ----------\n  buildIndexes(data){\n    this.seg = {}; this.personById = {}; this.orgById = {}; this.orgCat = {};\n    data.segments.forEach(s => {\n      this.seg[s.segment] = {orgs:s.orgs, orgCount:s.orgCount, peopleCount:s.peopleCount, central:!!s.central};\n      s.orgs.forEach(o => {\n        this.orgById[o.id] = o; this.orgCat[o.id] = s.segment;\n        o.people.forEach(p => { this.personById[p.id] = p; });\n      });\n    });\n  }\n  makeCats(data){\n    return data.segments.map((s,i) => ({id:'c'+i, segment:s.segment, central:!!s.central, x:0, y:0}));\n  }\n  makeEdges(cats){\n    const central = cats.find(c => c.central) || cats[0];\n    if(!central) return [];\n    return cats.filter(c => c !== central).map((c,i) => ({id:'e'+i, from:central.id, to:c.id, typeId:'t1'}));\n  }\n  loadData(data){\n    // Capture existing state before overwriting indexes\n    const prevCats = this.state.cats || [];\n    const prevActions = this.state.actions || [];\n\n    this.buildIndexes(data);\n    this.data = data;\n\n    const cats = this.makeCats(data);\n    this.catBySeg = {}; cats.forEach(c => this.catBySeg[c.segment] = c.id);\n\n    // Migrate actions: remap fromCatId by matching segment names, filter dead links\n    const oldCatIdToSeg = {};\n    prevCats.forEach(c => { oldCatIdToSeg[c.id] = c.segment; });\n    const migratedActions = prevActions.map(a => {\n      const seg = oldCatIdToSeg[a.fromCatId];\n      const newFromCatId = seg && this.catBySeg[seg] ? this.catBySeg[seg] : null;\n      const linkedOrgIds = (a.linkedOrgIds || []).filter(id => !!this.orgById[id]);\n      const linkedPersonIds = (a.linkedPersonIds || []).filter(id => !!this.personById[id]);\n      return {...a, fromCatId: newFromCatId, linkedOrgIds, linkedPersonIds};\n    });\n\n    const edges = this.makeEdges(cats);\n    this.pan = {x:0, y:0}; this.zoom = 1;\n    this.setState({\n      cats, edges, ready:false,\n      actions: migratedActions,\n      orgPositionOverrides:{}, personPositionOverrides:{},\n      selectedNodeId:null, selectedEdgeId:null, expandedCatId:null, expandedOrgId:null, personId:null,\n      importError:null,\n      filters:{ hidden:{}, pr:{4:true,3:true,2:true,1:true,0:true}, se:{opposed:true,unscored:true,supportive:true} }\n    }, () => requestAnimationFrame(() => this.relayout(false, () => this.repositionActionsNearCats())));\n  }\n\n  relayout(fitAfter, afterCallback){\n    const el = this.container; if(!el){ this.setState({ready:true}); return; }\n    const r = el.getBoundingClientRect();\n    const W = r.width || 1280, H = r.height || 720;\n    const cats = this.state.cats;\n    const central = cats.find(c => c.central) || cats[0];\n    const branches = cats.filter(c => c !== central);\n    const cx = W/2, cy = H/2 - 8;\n    const R = Math.max(220, Math.min(360, Math.min(W-220, H) * 0.40));\n    const pos = {}; if(central) pos[central.id] = {x:cx, y:cy};\n    const start = -Math.PI/2;\n    branches.forEach((c,i) => { const a = start + i*(Math.PI*2/Math.max(branches.length,1)); pos[c.id] = {x:cx + R*Math.cos(a), y:cy + R*Math.sin(a)}; });\n    this.setState(s => ({ cats: s.cats.map(c => pos[c.id] ? {...c, x:pos[c.id].x, y:pos[c.id].y} : c), ready:true }), () => { this.measure(); if(fitAfter) this.fitToNodes(); if(afterCallback) afterCallback(); });\n  }\n\n  repositionActionsNearCats(){\n    const s = this.state;\n    const actions = s.actions; if(!actions.length) return;\n    const cats = s.cats;\n    const catById = {}; cats.forEach(c => catById[c.id] = c);\n    const central = cats.find(c => c.central) || cats[0];\n\n    const getCatForAction = (a) => {\n      if(a.fromCatId && catById[a.fromCatId]) return catById[a.fromCatId];\n      for(const oid of (a.linkedOrgIds||[])){ const seg=this.orgCat[oid]; const cid=seg?this.catBySeg[seg]:null; if(cid&&catById[cid]) return catById[cid]; }\n      for(const pid of (a.linkedPersonIds||[])){ const org=Object.values(this.orgById).find(o=>(o.people||[]).some(p=>p.id===pid)); if(org){ const seg=this.orgCat[org.id]; const cid=seg?this.catBySeg[seg]:null; if(cid&&catById[cid]) return catById[cid]; } }\n      return null;\n    };\n\n    // Group actions by primary cat\n    const catGroups = {};\n    actions.forEach(a => { const cat=getCatForAction(a); const key=cat?cat.id:'__none__'; if(!catGroups[key]) catGroups[key]=[]; catGroups[key].push(a); });\n\n    const updatedPositions = {};\n    Object.entries(catGroups).forEach(([catId, group]) => {\n      const cat = catById[catId];\n      if(!cat){\n        // No associated cat — fan around center\n        group.forEach((a,i) => { const angle=i*(Math.PI*2/Math.max(group.length,1))-Math.PI/2; updatedPositions[a.id]={x:(central||{x:400}).x+Math.cos(angle)*200,y:(central||{y:300}).y+Math.sin(angle)*200}; });\n        return;\n      }\n      const cs = this.catSize(cat);\n      const outAngle = this.computeOutwardAngle(cat) ?? 0;\n      const baseR = Math.max(cs.w, cs.h)/2 + 140;\n      const perp = outAngle + Math.PI/2;\n      const n = group.length;\n      group.forEach((a,i) => {\n        const spread = (i - (n-1)/2) * 110;\n        updatedPositions[a.id] = {x: cat.x+Math.cos(outAngle)*baseR+Math.cos(perp)*spread, y: cat.y+Math.sin(outAngle)*baseR+Math.sin(perp)*spread};\n      });\n    });\n\n    if(Object.keys(updatedPositions).length){\n      this.setState(s => ({actions: s.actions.map(a => updatedPositions[a.id] ? {...a,...updatedPositions[a.id]} : a)}));\n    }\n  }\n\n  fitToNodes(){\n    const cats=this.state.cats; if(!cats.length||!this.container) return;\n    const r=this.container.getBoundingClientRect();\n    const W=r.width||1280, H=r.height||720;\n    const central=cats.find(c=>c.central)||cats[0]; if(!central) return;\n    const pad=90;\n    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;\n    cats.forEach(c=>{ const cs=this.catSize(c); minX=Math.min(minX,c.x-cs.w/2); maxX=Math.max(maxX,c.x+cs.w/2); minY=Math.min(minY,c.y-cs.h/2); maxY=Math.max(maxY,c.y+cs.h/2); });\n    const fitZoom=Math.max(0.35,Math.min(1.1,Math.min(W/(maxX-minX+pad*2),H/(maxY-minY+pad*2))));\n    const targetPan = {x:W/2-central.x*fitZoom, y:H/2-central.y*fitZoom};\n    this.animatePanZoom(targetPan, fitZoom, 500);\n  }\n\n  measure(){\n    if(!this.state.ready) return;\n    let changed = false; const sizes = {...this.state.sizes};\n    for(const c of this.state.cats){\n      const el = this.catEls[c.id];\n      if(el){ const w = el.offsetWidth, h = el.offsetHeight; const p = sizes[c.id];\n        if(!p || Math.abs(p.w-w)>0.5 || Math.abs(p.h-h)>0.5){ sizes[c.id] = {w,h}; changed = true; } }\n    }\n    if(changed) this.setState({sizes});\n  }\n\n  animatePanZoom(targetPan, targetZoom, duration=500){\n    this.pan = targetPan;\n    this.zoom = targetZoom;\n    this.forceUpdate();\n  }\n\n  catSize(c){ return this.state.sizes[c.id] || (c.central ? {w:214,h:78} : {w:158,h:66}); }\n  orgSize(o){ const w = Math.max(124, Math.min(214, (o.name||'').length*7.2 + 46)); return {w, h:50}; }\n  personSize(p){ const w = Math.max(126, Math.min(206, (p.name||'').length*7.4 + 44)); return {w, h: (p.title||'').trim() ? 54 : 40}; }\n\n  // ---------- encoding ----------\n  priorityMeta(raw){\n    const r = (raw||'').toLowerCase().trim();\n    if(/highest|urgent/.test(r)) return this.PRIORITY[0];\n    if(/^high/.test(r))         return this.PRIORITY[1];\n    if(/medium/.test(r))        return this.PRIORITY[2];\n    if(/low/.test(r))           return this.PRIORITY[3];\n    return this.PRIORITY[4];\n  }\n  sentimentMeta(raw){\n    const r = (raw||'').toLowerCase().trim();\n    if(!r || /not scored/.test(r) || r === '0') return {band:'unscored', color:'#c5c5be', label: raw && r!=='0' ? raw : 'Not scored'};\n    if(/strong\\s*oppos/.test(r)) return {band:'opp',     color:'#9e3b30', label:raw};\n    if(/weak\\s*oppos/.test(r))   return {band:'opp',     color:'#d39a92', label:raw};\n    if(/oppos/.test(r))          return {band:'opp',     color:'#bf6253', label:raw};\n    if(/strong\\s*support/.test(r))return {band:'sup',    color:'#1f7a52', label:raw};\n    if(/weak\\s*support/.test(r)) return {band:'sup',     color:'#86bd9b', label:raw};\n    if(/support|advoc|champion/.test(r)) return {band:'sup', color:'#2f8f63', label:raw};\n    if(/neutral/.test(r))        return {band:'unscored', color:'#b0b0a8', label:raw};\n    return {band:'unscored', color:'#b0b0a8', label:raw};\n  }\n  sentGroup(band){ return band === 'opp' ? 'opposed' : (band === 'sup' ? 'supportive' : 'unscored'); }\n  segColor(cat){ if(cat.central) return this.CENTRAL_COLOR; const i = this.state.cats.fil
