ver=\"background:#245fc0\">✓<\u002Fbutton>\n        <button onclick=\"{{ cancelAddTab }}\" style=\"border:none;background:#f2f2ef;color:#6b7280;font-size:12px;font-weight:700;padding:4px 10px;border-radius:7px;cursor:pointer\" style-hover=\"background:#e4e4e1\">×<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ notAddingTab }}\">\n      <button onclick=\"{{ addTab }}\" style=\"flex:none;border:1px dashed #d0d0ca;background:transparent;color:#9a9a93;font-size:14px;font-weight:600;width:26px;height:26px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:2px\" style-hover=\"border-color:#2a6fdb;color:#2a6fdb\">+<\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div ref=\"{{ setContainer }}\" style=\"{{ canvasStyle }}\">\n\n    <svg ref=\"{{ setSvgLayer }}\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:5;pointer-events:none;transform:translate({{ pan.x }}px, {{ pan.y }}px) scale({{ zoom }});transform-origin:0 0;will-change:transform;transition:{{ mapTransition }}\">\n      <sc-for list=\"{{ edgeViews }}\" as=\"ed\" hint-placeholder-count=\"6\">\n        <g>\n          <line x1=\"{{ ed.x1 }}\" y1=\"{{ ed.y1 }}\" x2=\"{{ ed.x2 }}\" y2=\"{{ ed.y2 }}\" style=\"{{ ed.hitStyle }}\" onclick=\"{{ ed.onClick }}\"><\u002Fline>\n          <sc-if value=\"{{ ed.selected }}\"><line x1=\"{{ ed.x1 }}\" y1=\"{{ ed.y1 }}\" x2=\"{{ ed.x2 }}\" y2=\"{{ ed.y2 }}\" style=\"{{ ed.haloStyle }}\"><\u002Fline><\u002Fsc-if>\n          <line x1=\"{{ ed.x1 }}\" y1=\"{{ ed.y1 }}\" x2=\"{{ ed.x2 }}\" y2=\"{{ ed.y2 }}\" style=\"{{ ed.lineStyle }}\"><\u002Fline>\n        <\u002Fg>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ linkLine }}\"><line x1=\"{{ linkLine.x1 }}\" y1=\"{{ linkLine.y1 }}\" x2=\"{{ linkLine.x2 }}\" y2=\"{{ linkLine.y2 }}\" style=\"{{ linkLine.style }}\"><\u002Fline><\u002Fsc-if>\n      <sc-for list=\"{{ mixedEdgeViews }}\" as=\"me\" hint-placeholder-count=\"0\">\n s=\"pip\" hint-placeholder-count=\"2\">\n                <span style=\"display:flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:{{ pip.color }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ pip.color }}\"><\u002Fspan>{{ pip.count }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ orgViews }}\" as=\"org\" hint-placeholder-count=\"5\">\n        <div data-node=\"1\" style=\"{{ org.style }}\">\n          <div style=\"display:flex;align-items:center;gap:6px\">\n            <span style=\"flex:none;width:8px;height:8px;border-radius:50%;background:{{ org.dotColor }}\"><\u002Fspan>\n            <span style=\"flex:1;min-width:0;font-size:12px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ org.name }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:4px\">\n            <span style=\"font-size:10px;font-weight:600;color:#8a8a83\">{{ org.countLabel }}<\u002Fspan>\n            <div style=\"display:flex;gap:2px\">\n              <sc-for list=\"{{ org.sentDots }}\" as=\"sd\" hint-placeholder-count=\"3\">\n                <span style=\"width:6px;height:6px;border-radius:50%;background:{{ sd.color }}\"><\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ personViews }}\" as=\"pn\" hint-placeholder-count=\"5\">\n        <div data-node=\"1\" style=\"{{ pn.style }}\">\n          <span style=\"position:absolute;top:7px;right:8px;width:9px;height:9px;border-radius:50%;background:{{ pn.prColor }};border:1.5px solid #fff;box-shadow:0 0 0 1px {{ pn.prRing }}\"><\u002Fspan>\n          <div style=\"font-size:12px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;padding-right:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ pn.name }}<\u002Fdiv>\n          <sc-if value=\"{{ pn.hasTitle }}\"><div style=\"font-size:10px;font-weight:500;line-height:1.25;margin-top:2px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ pn.title }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ actionViews }}\" as=\"av\" hint-placeholder-count=\"0\">\n        <div data-node=\"1\" style=\"{{ av.style }}\">\n          <div style=\"font-size:12.5px;font-weight:700;line-height:1.3;letter-spacing:-0.01em;color:#1a3a6e;white-space:normal;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical\">{{ av.name }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:4px;margin-top:5px\">\n            <span style=\"width:6px;height:6px;border-radius:50%;background:{{ av.statusColor }};flex:none\"><\u002Fspan>\n            <span style=\"font-size:10px;font-weight:600;color:{{ av.statusColor }}\">{{ av.statusLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ linkingActive }}\">\n      <div style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:70;background:#22262d;color:#fff;font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;box-shadow:0 6px 18px rgba(20,24,32,.22)\">Click a segment, org, or person to connect · Esc to cancel<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-for list=\"{{ catViews }}\" as=\"cat\" hint-placeholder-count=\"7\">\n      <sc-if value=\"{{ cat.toolbarVisible }}\">\n        <div style=\"{{ cat.toolbarStyle }}\">\n          <button data-no-drag=\"1\" onclick=\"{{ cat.onExpandBtn }}\" style=\"border:none;background:transparent;color:#2a6fdb;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#eef3fc\">{{ cat.expandLabel }}<\u002Fbutton>\n          <button data-no-drag=\"1\" onclick=\"{{ cat.onLinkBtn }}\" style=\"border:none;background:transparent;color:#22262d;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#f0f0ed\">Link<\u002Fbutton>\n          <button data-no-drag=\"1\" onclick=\"{{ cat.onActionBtn }}\" style=\"border:none;background:#eef3fb;color:#2a6fdb;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#dce9f8\">NEER Action<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-for>\n\n    <sc-for list=\"{{ orgViews }}\" as=\"org\" hint-placeholder-count=\"0\">\n      <sc-if value=\"{{ org.toolbarVisible }}\">\n        <div style=\"{{ org.toolbarStyle }}\">\n          <button data-no-drag=\"1\" onclick=\"{{ org.onExpandBtn }}\" style=\"border:none;background:transparent;color:#2a6fdb;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#eef3fc\">{{ org.expandLabel }}<\u002Fbutton>\n          <button data-no-drag=\"1\" onclick=\"{{ org.onLinkBtn }}\" style=\"border:none;background:transparent;color:#22262d;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#f0f0ed\">Link<\u002Fbutton>\n          <button data-no-drag=\"1\" onclick=\"{{ org.onActionBtn }}\" style=\"border:none;background:#eef3fb;color:#2a6fdb;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer\" style-hover=\"background:#dce9f8\">NEER Action<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-for>\n\n    <sc-if value=\"{{ edgePopover }}\">\n      <div style=\"{{ edgePopover.style }}\">\n        <div onpointerdown=\"{{ edgePopover.onDragStart }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin:-11px -11px 7px;padding:8px 10px;border-bottom:1px solid #f0f0ed;cursor:grab;border-radius:11px 11px 0 0\">\n          <span style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase\">Connection type<\u002Fspan>\n          <button onclick=\"{{ edgePopover.onClose }}\" style=\"flex:none;border:none;background:#f2f2ef;color:#6b7280;width:20px;height:20px;border-radius:6px;font-size:13px;line-height:1;cursor:pointer\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px\">\n          <sc-for list=\"{{ edgePopover.chips }}\" as=\"chip\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">\n              <span style=\"{{ chip.preview }}\"><\u002Fspan>\n              <span style=\"flex:1;text-align:left\">{{ chip.label }}<\u002Fspan>\n              <sc-if value=\"{{ chip.active }}\"><span style=\"color:#3a4a63;font-weight:700\">✓<\u002Fspan><\u002Fsc-if>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ edgePopover.onDelete }}\" style=\"margin-top:8px;width:100%;border:1px solid #ecdad7;background:#fbf2f1;color:#b04a3f;font-size:12px;font-weight:600;padding:7px;border-radius:8px;cursor:pointer\">Delete connection<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:56;display:flex;gap:8px;align-items:center;font-size:11px;font-weight:600;color:#9a9a93\">\n      <button onclick=\"{{ resetView }}\" style=\"background:#fff;border:1px solid #e4e4e1;border-radius:9px;padding:6px 12px;box-shadow:0 2px 7px rgba(20,24,32,.08);cursor:pointer;color:#22262d;font-weight:600\" style-hover=\"background:#f6f6f3\">⤢ Reset view<\u002Fbutton>\n      <div style=\"background:#fff;border:1px solid #e4e4e1;border-radius:9px;padding:6px 12px;box-shadow:0 2px 7px rgba(20,24,32,.08)\">{{ zoomText }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isEmpty }}\">\n      <div style=\"position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;background:#fff;border:1px solid #e4e4e1;border-radius:16px;padding:34px 40px;box-shadow:0 14px 40px rgba(20,24,32,.12);max-width:420px;text-align:center\">\n          <div style=\"font-size:30px\">🗺️<\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:700;color:#22262d\">No stakeholders loaded<\u002Fdiv>\n          <div style=\"font-size:12.5px;font-weight:500;color:#6b7280;line-height:1.5\">Import a monday.com stakeholder export (.xlsx). The map builds automatically — segments become categories, organizations and people nest inside.<\u002Fdiv>\n          <button onclick=\"{{ openImport }}\" style=\"margin-top:4px;border:none;background:#2a6fdb;color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:10px;cursor:pointer\" style-hover=\"background:#245fc0\">Import spreadsheet<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ importError }}\">\n      <div style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:95;background:#fbf2f1;border:1px solid #ecdad7;color:#b04a3f;font-size:12px;font-weight:600;padding:9px 16px;border-radius:10px;box-shadow:0 6px 18px rgba(20,24,32,.16)\">{{ importError }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasPersonQuickMenu }}\">\n      <div onclick=\"{{ personQuickMenu.onClose }}\" style=\"position:fixed;inset:0;z-index:93\"><\u002Fdiv>\n      <div style=\"{{ personQuickMenu.style }}\">\n        <button onclick=\"{{ personQuickMenu.onDetails }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;border:none;background:transparent;color:#22262d;font-size:12.5px;font-weight:600;padding:8px 11px;border-radius:7px;cursor:pointer;text-align:left\" style-hover=\"background:#f2f2ef\">Details<\u002Fbutton>\n        <button onclick=\"{{ personQuickMenu.onLink }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;border:none;background:transparent;color:#22262d;font-size:12.5px;font-weight:600;padding:8px 11px;border-radius:7px;cursor:pointer;text-align:left\" style-hover=\"background:#f2f2ef\">Link<\u002Fbutton>\n        <button onclick=\"{{ personQuickMenu.onNeerAction }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;border:none;background:transparent;color:#2a6fdb;font-size:12.5px;font-weight:600;padding:8px 11px;border-radius:7px;cursor:pointer;text-align:left\" style-hover=\"background:#eef3fb\">NEER Action<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasTabMenu }}\">\n      <div onclick=\"{{ tabMenu.onClose }}\" style=\"position:fixed;inset:0;z-index:199\"><\u002Fdiv>\n      <div style=\"{{ tabMenu.style }}\">\n        <button onclick=\"{{ tabMenu.onRename }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;border:none;background:transparent;color:#22262d;font-size:12.5px;font-weight:600;padding:8px 11px;border-radius:7px;cursor:pointer;text-align:left\" style-hover=\"background:#f2f2ef\">✎ Rename<\u002Fbutton>\n        <sc-if value=\"{{ tabMenu.canDelete }}\">\n          <button onclick=\"{{ tabMenu.onDelete }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;border:none;background:transparent;color:#b04a3f;font-size:12.5px;font-weight:600;padding:8px 11px;border-radius:7px;cursor:pointer;text-align:left\" style-hover=\"background:#fbf2f1\">✕ Delete<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ filterOpen }}\">\n      <div style=\"position:absolute;left:18px;top:18px;bottom:18px;z-index:58;width:280px;display:flex;flex-direction:column;background:#fff;border:1px solid #e4e4e1;border-radius:13px;box-shadow:0 10px 34px rgba(20,24,32,.14);overflow:hidden\">\n        <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #eeeeeb\">\n          <span style=\"font-size:13px;font-weight:700\">Filter &amp; sort<\u002Fspan>\n          <button onclick=\"{{ toggleFilter }}\" style=\"border:none;background:transparent;color:#9a9a93;font-size:16px;cursor:pointer\" style-hover=\"color:#22262d\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow-y:auto;flex:1;padding:13px 15px\">\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px\">Sort within groups<\u002Fdiv>\n          <select value=\"{{ sortBy }}\" onchange=\"{{ onSort }}\" style=\"width:100%;font-size:12.5px;font-weight:600;border:1px solid #e4e4e1;border-radius:8px;padding:7px 9px;background:#fff;color:#22262d;cursor:pointer\">\n            <option value=\"priority\">Priority (high → low)<\u002Foption>\n            <option value=\"people\">Number of people<\u002Foption>\n            <option value=\"name\">Name (A → Z)<\u002Foption>\n          <\u002Fselect>\n\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px\">Priority<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ priorityFilters }}\" as=\"pf\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ pf.onToggle }}\" style=\"{{ pf.rowStyle }}\">\n                <span style=\"flex:none;width:11px;height:11px;border-radius:50%;background:{{ pf.color }}\"><\u002Fspan>\n                <span style=\"flex:1;text-align:left;font-size:12px;font-weight:600\">{{ pf.label }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;color:#9a9a93\">{{ pf.count }}<\u002Fspan>\n                <span style=\"{{ pf.checkStyle }}\">✓<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px\">Sentiment<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ sentimentFilters }}\" as=\"sf\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ sf.onToggle }}\" style=\"{{ sf.rowStyle }}\">\n                <span style=\"flex:none;width:11px;height:11px;border-radius:50%;background:{{ sf.color }}\"><\u002Fspan>\n                <span style=\"flex:1;text-align:left;font-size:12px;font-weight:600\">{{ sf.label }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;color:#9a9a93\">{{ sf.count }}<\u002Fspan>\n                <span style=\"{{ sf.checkStyle }}\">✓<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px\">Segments<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ segmentFilters }}\" as=\"gf\" hint-placeholder-count=\"6\">\n              <button onclick=\"{{ gf.onToggle }}\" style=\"{{ gf.rowStyle }}\">\n                <span style=\"flex:none;width:11px;height:11px;border-radius:3px;background:{{ gf.color }}\"><\u002Fspan>\n                <span style=\"flex:1;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ gf.label }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;color:#9a9a93\">{{ gf.count }}<\u002Fspan>\n                <span style=\"{{ gf.checkStyle }}\">✓<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:none;padding:11px 15px;border-top:1px solid #eeeeeb\">\n          <button onclick=\"{{ resetFilters }}\" style=\"width:100%;border:1px solid #e4e4e1;background:#fafaf8;color:#6b7280;font-size:12px;font-weight:600;padding:8px;border-radius:8px;cursor:pointer\" style-hover=\"background:#f2f2ef\">Reset filters<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasActionPane }}\">\n      <div style=\"position:absolute;right:18px;top:18px;bottom:18px;z-index:68;width:316px;display:flex;flex-direction:column;background:#fff;border:1px solid #dce9f8;border-top:3px solid #2a6fdb;border-radius:13px;box-shadow:0 10px 34px rgba(42,111,219,.2);overflow:hidden\">\n        <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #eeeeeb\">\n          <span style=\"font-size:13px;font-weight:700;color:#2a6fdb\">{{ actionPaneView.title }}<\u002Fspan>\n          <button onclick=\"{{ actionPaneView.onClose }}\" style=\"border:none;background:#f2f2ef;color:#6b7280;width:22px;height:22px;border-radius:6px;font-size:14px;line-height:1;cursor:pointer\" style-hover=\"color:#22262d\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow-y:auto;flex:1;padding:14px 15px;display:flex;flex-direction:column;gap:14px\">\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px\">Action name *<\u002Fdiv>\n            <div style=\"position:relative\">\n              <input value=\"{{ actionPaneView.name }}\" onchange=\"{{ actionPaneView.onName }}\" placeholder=\"e.g. Meeting with county commissioners\" style=\"width:100%;font-size:13px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:8px 10px;outline:none;color:#22262d;box-sizing:border-box;font-family:inherit\">\n              <sc-if value=\"{{ actionPaneView.hasMentionInName }}\">\n                <div style=\"position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:22;background:#fff;border:1px solid #dce9f8;border-radius:9px;box-shadow:0 6px 18px rgba(42,111,219,.18);overflow:hidden\">\n                  <sc-for list=\"{{ actionPaneView.mentionResults }}\" as=\"mr\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ mr.onSelect }}\" style=\"display:flex;align-items:center;gap:8px;width:100%;border:none;border-bottom:1px solid #f0f5ff;background:transparent;padding:7px 10px;cursor:pointer;font-family:inherit\" style-hover=\"background:#eef3fb\">\n                      <span style=\"flex:none;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:#eef3fb;color:#2a6fdb\">{{ mr.typeLabel }}<\u002Fspan>\n                      <span style=\"font-size:12.5px;font-weight:500;color:#22262d;text-align:left\">{{ mr.name }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">Category<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:5px\">\n              <sc-for list=\"{{ actionPaneView.categories }}\" as=\"ac\" hint-placeholder-count=\"7\">\n                <button onclick=\"{{ ac.onSelect }}\" style=\"{{ ac.style }}\">{{ ac.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ actionPaneView.isCustom }}\">\n              <input value=\"{{ actionPaneView.customCategory }}\" onchange=\"{{ actionPaneView.onCustomCat }}\" placeholder=\"Describe this action type…\" style=\"width:100%;margin-top:7px;font-size:12.5px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:7px 10px;outline:none;color:#22262d;box-sizing:border-box;font-family:inherit\">\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">Status<\u002Fdiv>\n            <div style=\"display:flex;gap:5px\">\n              <sc-for list=\"{{ actionPaneView.statuses }}\" as=\"ast\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ ast.onSelect }}\" style=\"{{ ast.style }}\">\n                  <span style=\"width:6px;height:6px;border-radius:50%;background:{{ ast.color }};flex:none\"><\u002Fspan>\n                  {{ ast.label }}\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px\">Description / notes<\u002Fdiv>\n            <div style=\"position:relative\">\n              <textarea value=\"{{ actionPaneView.description }}\" onchange=\"{{ actionPaneView.onDesc }}\" placeholder=\"What is the plan for this action?\" rows=\"3\" style=\"width:100%;font-size:12.5px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:8px 10px;outline:none;color:#22262d;resize:vertical;font-family:inherit;line-height:1.45;box-sizing:border-box\"><\u002Ftextarea>\n              <sc-if value=\"{{ actionPaneView.hasMentionInDesc }}\">\n                <div style=\"position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:22;background:#fff;border:1px solid #dce9f8;border-radius:9px;box-shadow:0 6px 18px rgba(42,111,219,.18);overflow:hidden\">\n                  <sc-for list=\"{{ actionPaneView.mentionResults }}\" as=\"mr\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ mr.onSelect }}\" style=\"display:flex;align-items:center;gap:8px;width:100%;border:none;border-bottom:1px solid #f0f5ff;background:transparent;padding:7px 10px;cursor:pointer;font-family:inherit\" style-hover=\"background:#eef3fb\">\n                      <span style=\"flex:none;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:#eef3fb;color:#2a6fdb\">{{ mr.typeLabel }}<\u002Fspan>\n                      <span style=\"font-size:12.5px;font-weight:500;color:#22262d;text-align:left\">{{ mr.name }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px\">Link to stakeholders<\u002Fdiv>\n            <input value=\"{{ actionPaneView.search }}\" onchange=\"{{ actionPaneView.onSearch }}\" placeholder=\"Search orgs &amp; people…\" style=\"width:100%;font-size:12.5px;font-weight:500;border:1px solid #e4e4e1;border-radius:8px;padding:7px 10px;outline:none;color:#22262d;box-sizing:border-box;font-family:inherit\">\n            <sc-if value=\"{{ actionPaneView.hasSearchResults }}\">\n              <div style=\"margin-top:5px;border:1px solid #e4e4e1;border-radius:8px;overflow:hidden\">\n                <sc-for list=\"{{ actionPaneView.searchResults }}\" as=\"sr\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ sr.onToggle }}\" style=\"{{ sr.rowStyle }}\">\n                    <span style=\"flex:none;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:#eef3fb;color:#2a6fdb\">{{ sr.typeLabel }}<\u002Fspan>\n                    <span style=\"flex:1;font-size:12px;font-weight:500;color:#22262d;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ sr.name }}<\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:700;color:{{ sr.checkColor }}\">{{ sr.checkMark }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ actionPaneView.hasLinked }}\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:4px;margin-top:7px\">\n                <sc-for list=\"{{ actionPaneView.linkedItems }}\" as=\"li\" hint-placeholder-count=\"1\">\n                  <button onclick=\"{{ li.onRemove }}\" style=\"display:flex;align-items:center;gap:4px;border:1px solid #dce9f8;background:#eef3fb;color:#2a6fdb;font-size:11px;font-weight:600;padding:3px 8px 3px 10px;border-radius:999px;cursor:pointer;font-family:inherit\" style-hover=\"background:#dce9f8\">\n                    {{ li.name }} <span style=\"opacity:.55;font-size:13px;line-height:1\">×<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n        <div style=\"flex:none;padding:11px 15px;border-top:1px solid #eeeeeb;display:flex;gap:8px\">\n          <sc-if value=\"{{ actionPaneView.isEdit }}\">\n            <button onclick=\"{{ actionPaneView.onDelete }}\" style=\"flex:none;border:1px solid #ecdad7;background:#fbf2f1;color:#b04a3f;font-size:12px;font-weight:600;padding:9px 13px;border-radius:9px;cursor:pointer;font-family:inherit\" style-hover=\"background:#f5e8e6\">Delete<\u002Fbutton>\n          <\u002Fsc-if>\n          <button onclick=\"{{ actionPaneView.onSave }}\" style=\"{{ actionPaneView.saveStyle }}\">Save action<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"position:absolute;right:18px;bottom:64px;z-index:55;width:228px;background:#fff;border:1px solid #e4e4e1;border-radius:12px;box-shadow:0 8px 24px rgba(20,24,32,.12);overflow:hidden\">\n      <button onclick=\"{{ toggleKey }}\" style=\"display:flex;align-items:center;justify-content:space-between;width:100%;border:none;background:transparent;padding:11px 13px;cursor:pointer\">\n        <span style=\"font-size:12px;font-weight:700;color:#22262d\">Key<\u002Fspan>\n        <span style=\"{{ keyChevron }}\">⌃<\u002Fspan>\n      <\u002Fbutton>\n      <sc-if value=\"{{ keyOpen }}\">\n        <div style=\"padding:0 13px 13px\">\n e:{{ kl.dash }};border-top-color:{{ kl.color }}\"><\u002Fspan>\n                <span style=\"font-size:11px;font-weight:500;color:#374151\">{{ kl.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px\">Levels<\u002Fdiv>\n          <div style=\"font-size:10.5px;font-weight:500;color:#6b7280;line-height:1.5\">Click a segment → <b style=\"color:#22262d\">Expand<\u002Fb> for orgs · click an org for its people · click a person for options (details, link, or NEER action).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ personDialog }}\">\n      <div onclick=\"{{ closePerson }}\" style=\"position:absolute;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:rgba(20,24,32,.34)\">\n        <div onclick=\"{{ stop }}\" style=\"width:480px;max-width:calc(100% - 40px);max-height:calc(100% - 56px);display:flex;flex-direction:column;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(20,24,32,.34);overflow:hidden\">\n          <div style=\"flex:none;display:flex;align-items:flex-start;gap:13px;padding:18px 20px 15px;border-bottom:1px solid #eeeeeb;background:{{ personDialog.headerBg }}\">\n            <div style=\"flex:none;width:44px;height:44px;border-radius:50%;background:{{ personDialog.avatarBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700\">{{ personDialog.initials }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:2px\">\n              <span style=\"font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.2\">{{ personDialog.name }}<\u002Fspan>\n              <sc-if value=\"{{ personDialog.hasTitle }}\"><span style=\"font-size:12px;font-weight:500;color:#6b7280;line-height:1.3\">{{ personDialog.title      <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ personDialog.hasNotes }}\">\n              <div style=\"margin-top:16px\">\n                <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px\">Notes<\u002Fdiv>\n                <div style=\"font-size:12.5px;font-weight:500;color:#374151;line-height:1.5;white-space:pre-wrap;background:#fafaf8;border:1px solid #eeeeeb;border-radius:9px;padding:10px 12px\">{{ personDialog.notes }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ personDialog.hasOutputs }}\">\n              <div style=\"margin-top:12px\">\n                <div style=\"font-size:9.5px;font-weight:700;color:#9a9a93;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px\">Outputs<\u002Fdiv>\n                <div style=\"font-size:12.5px;font-weight:500;color:#374151;line-height:1.5;white-space:pre-wrap;background:#fafaf8;border:1px solid #eeeeeb;border-radius:9px;padding:10px 12px\">{{ personDialog.outputs }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"flex:none;padding:12px 20px;border-top:1px solid #eeeeeb\">\n            <button onclick=\"{{ personDialog.onNeerAction }}\" style=\"width:100%;border:none;background:#eef3fb;color:#2a6fdb;font-size:13px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer\" style-hover=\"background:#dce9f8\">⬡ NEER Action<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;colorBy&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Sentiment&quot;,&quot;Priority&quot;],&quot;default&quot;:&quot;Sentiment&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.catEls = {};\n    this.actionEls = {};\n    this.container = null;\n    this.pan = {x:0, y:0};\n    this.zoom = 1;\n    this.drag = null; this.panDrag = null; this.popDrag = null; this.actionDrag = null; this.orgDrag = null; this.personDrag = null; this._orgDragMoved = null; this._personDragMoved = null;\n    this.ACTION_CATS = ['Direct meeting / briefing','Media outreach / press','Letter / formal correspondence','Public comment / testimony','Community event / town hall','Regulatory / legal filing','Custom'];\n    this.ACTION_STATUSES = [{id:'planned',label:'Planned',color:'#8a8a83'},{id:'in-progress',label:'In Progress',color:'#cf7a33'},{id:'done',label:'Done',color:'#2f8f63'}];\n    this.data = null; this.seg = {}; this.personById = {}; this.orgById = {}; this.catBySeg = {}; this.orgCat = {};\n    this.SEG_PALETTE = ['#7a5d3a','#3f6b52','#6b3f5d','#4a5a7a','#7a3f3f','#566b3a','#3a6b6b','#6b5a3a','#5a5a52'];\n    this.CENTRAL_COLOR = '#2a3a55';\n    this.STORE_KEY = 'ksim_v2';\n    this.META_KEY  = 'ksim_v2_meta';\n    this.PRIORITY = [\n      {rank:4, label:'Highest / Urgent', color:'#b04a3f'},\n      {rank:3, label:'High',             color:'#cf7a33'},\n      {rank:2, label:'Medium',           color:'#be9a2b'},\n      {rank:1, label:'Low',              color:'#6b8f4e'},\n      {rank:0, label:'Not started',      color:'#bdbdb6'}\n    ];\n    this.SENT_GROUPS = [\n      {key:'opposed',    label:'Opposed',              color:'#bf6253'},\n      {key:'unscored',   label:'Neutral / Not scored', color:'#c5c5be'},\n      {key:'supportive', label:'Supportive',           color:'#2f8f63'}\n    ];\n    this.state = {\n      cats:[], edges:[], actions:[], actionPaneState:null, orgPositionOverrides:{}, personPositionOverrides:{}, ready:false, showActions:true,\n      lineTypes:[\n        {id:'t1', label:'Influence',  color:'#3a4a63', dash:'solid',  weight:2},\n        {id:'t2', label:'Pressure',   color:'#c0892d', dash:'dashed', weight:2},\n        {id:'t3', label:'Opposition', color:'#b04a3f', dash:'dotted', weight:2.5},\n        {id:'t4', label:'Support',    color:'#2f8f63', dash:'solid',  weight:2},\n        {id:'t5', label:'Financing',  color:'#7a4fa0', dash:'dashed', weight:2}\n      ],\n      activeTypeId:'t1',\n      sizes:{},\n      selectedNodeId:null, selectedEdgeId:null, selectedOrgId:null,\n      expandedCatIds:{}, expandedOrgIds:{}, personId:null,\n      filters:{ hidden:{}, pr:{4:true,3:true,2:true,1:true,0:true}, se:{opposed:true,unscored:true,supportive:true} },\n      sortBy:'priority', filterOpen:false, keyOpen:true,\n      linking:null, popOffset:{x:0,y:0}, importError:null,\n      tabs:[], activeTabId:'', addingTab:false, newTabName:'',\n      renamingTabId:null, renameValue:'', tabMenuId:null, tabMenuX:0, tabMenuY:0, personQuickMenuId:null\n    };\n    this.onWinMove = this.onWinMove.bind(this);\n    this.onWinUp = this.onWinUp.bind(this);\n    this.onKey = this.onKey.bind(this);\n    this._panInit = false;\n  }\n\n  // ---------- lifecycle ----------\n  componentDidMount(){\n    window.addEventListener('pointermove', this.onWinMove);\n    window.addEventListener('pointerup', this.onWinUp);\n    window.addEventListener('keydown', this.onKey);\n    document.addEventListener('click', ()=>{ if(this.state.tabMenuId) this.closeTabMenu(); });\n    this.container.addEventListener('wheel', this.onWheel.bind(this), {passive:false});\n    if(!this.tryRestore()) this.trySeed(0);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('pointermove', this.onWinMove);\n    window.removeEventListener('pointerup', this.onWinUp);\n    window.removeEventListener('keydown', this.onKey);\n  }\n\n  _forceNodePointerEvents(){\n    if(!this._nodeLayer) return;\n    this._nodeLayer.querySelectorAll('[data-node=\"1\"]').forEach(el => {\n      if(el.style.pointerEvents !== 'auto') el.style.pointerEvents = 'auto';\n    });\n  }\n  componentDidUpdate(){ this.measure(); this.schedulePersist(); this._forceNodePointerEvents(); }\n\n  trySeed(attempt){\n    if(typeof window !== 'undefined' && window.KSIM_SEED){ this.loadData(window.KSIM_SEED); return; }\n    if(attempt < 25) setTimeout(() => this.trySeed(attempt+1), 120);\n  }\n  defaultTabs(){\n    return [\n      {id:'tab_sedgwick',  name:'Sedgwick'},\n      {id:'tab_jp',        name:'Jackson/Pottawatomie'},\n      {id:'tab_sl',        name:'Scott/Lane'},\n      {id:'tab_sumner',    name:'Sumner'}\n    ];\n  }\n  getTabKey(tabId){ return 'ksim_v2_tab_' + tabId; }\n  persistMeta(){\n    try { localStorage.setItem(this.META_KEY, JSON.stringify({tabs:this.state.tabs, activeTabId:this.state.activeTabId})); } catch(_){}\n  }\n\n  tryRestoreFromRaw(raw){\n    try {\n      const s = JSON.parse(raw);\n      if(!s || !s.data || !Array.isArray(s.data.segments)) return false;\n      this.buildIndexes(s.data);\n      this.data = s.data;\n      const cats = (s.cats && s.cats.length) ? s.cats : this.makeCats(s.data);\n      cats.forEach(c => this.catBySeg[c.segment] = c.id);\n      const hasPos = cats.some(c => c.x || c.y);\n      if(s.pan) this.pan = {x:s.pan.x||0, y:s.pan.y||0};\n      if(typeof s.zoom === 'number') this.zoom = s.zoom;\n      this.setState({\n        cats, ready: hasPos,\n        edges: s.edges || this.makeEdges(cats),\n        actions: s.actions || [],\n        orgPositionOverrides: s.orgPositionOverrides || {},\n        personPositionOverrides: s.personPositionOverrides || {},\n        lineTypes: (() => {\n          const defaults = this.state.lineTypes;\n          const saved = s.lineTypes;\n          if(!saved) return defaults;\n          // Keep saved types but always append any default types missing from saved\n          const savedIds = new Set(saved.map(t => t.id));\n          return [...saved, ...defaults.filter(t => !savedIds.has(t.id))];\n        })(),\n        activeTypeId: s.activeTypeId || 't1',\n
